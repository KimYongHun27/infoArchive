<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>강사 대시보드</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">
  <link rel="stylesheet" th:href="@{/css/instructor-dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="instructor-page">

  <section class="instructor-title">
    <div>
      <span class="page-badge">INSTRUCTOR CENTER</span>
      <h1>강사 대시보드</h1>
      <p>강의 등록, 수강생 현황, 리뷰를 관리할 수 있습니다.</p>
    </div>
  </section>

  <section class="summary-grid">
    <div class="summary-card">
      <span>등록 강의</span>
      <strong>0</strong>
      <p>현재 등록된 강의 수</p>
    </div>

    <div class="summary-card">
      <span>전체 수강생</span>
      <strong>0</strong>
      <p>강의를 수강 중인 회원 수</p>
    </div>

    <div class="summary-card">
      <span>리뷰</span>
      <strong>0</strong>
      <p>수강생이 남긴 리뷰 수</p>
    </div>
  </section>

  <section class="instructor-menu-grid">

    <a th:href="@{/instructor/products}" class="menu-card">
      <div class="menu-icon">📚</div>
      <h3>내 강의 관리</h3>
      <p>등록한 강의 목록을 확인하고 관리합니다.</p>
    </a>

    <a th:href="@{/instructor/products/create}" class="menu-card">
      <div class="menu-icon">➕</div>
      <h3>강의 등록</h3>
      <p>새로운 강의를 등록하고 판매할 수 있습니다.</p>
    </a>

    <a th:href="@{/instructor/reviews}" class="menu-card">
      <div class="menu-icon">⭐</div>
      <h3>리뷰 관리</h3>
      <p>수강생이 남긴 리뷰와 평점을 확인합니다.</p>
    </a>

  </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/subscribe.js}"></script>

</body>
</html>
