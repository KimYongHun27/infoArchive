<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>리뷰 관리 - InfoArchive</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">
  <link rel="stylesheet" th:href="@{/css/review.css}">
</head>

<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="lecture-review-page">

  <div class="lecture-review-layout">

    <!-- 왼쪽 사이드바 -->
    <aside class="review-sidebar">
      <div class="review-sidebar-card">

        <div class="review-sidebar-title">
          <span>▦</span>
          <strong>나의 강의장</strong>
        </div>

        <nav class="review-side-menu">
          <a th:href="@{/dashboard}">
            <span>⌂</span>
            대시보드
          </a>

          <a th:href="@{/taking-course}">
            <span>▶</span>
            수강중인 강의
          </a>

          <a th:href="@{/wishlist}">
            <span>♡</span>
            찜한 강의
          </a>

          <a th:href="@{/orders}">
            <span>▤</span>
            주문내역
          </a>

          <a th:href="@{/coupon}">
            <span>%</span>
            쿠폰함
          </a>

          <a th:href="@{/member-info}">
            <span>◎</span>
            회원 정보
          </a>

          <a th:href="@{/review}" class="active">
            <span>★</span>
            리뷰 관리
          </a>
        </nav>

        <div class="review-customer-box">
          <h3>고객센터</h3>
          <p>평일 10:00 ~ 18:00</p>
          <p>점심 12:00 ~ 13:00</p>
          <strong>010-0000-0000</strong>
        </div>

      </div>
    </aside>

    <!-- 오른쪽 본문 -->
    <section class="lecture-review-content">

      <section class="review-list-section">

        <div class="section-title">
          <h2>리뷰 관리</h2>
          <p>내가 작성한 리뷰를 확인하고 수정하거나 삭제할 수 있습니다.</p>
        </div>

        <div class="review-list">

          <!-- 내가 작성한 리뷰가 없을 때 -->
          <div class="empty-review-box"
               th:if="${reviewList == null or #lists.isEmpty(reviewList)}">

            <h2>작성한 리뷰가 없습니다.</h2>

            <p>
              수강한 강의에서 리뷰를 작성하면<br>
              이곳에서 수정하거나 삭제할 수 있습니다.
            </p>

            <a th:href="@{/taking-course}" class="empty-review-btn">
              수강중인 강의 보기
            </a>

          </div>

          <!-- 내가 작성한 리뷰가 있을 때 -->
          <div class="review-card"
               th:if="${reviewList != null and !#lists.isEmpty(reviewList)}"
               th:each="review : ${reviewList}">

            <div class="review-card-head">
              <div>
                <h3 th:text="${review.product != null ? review.product.productName : review.title}">
                  강의명
                </h3>

                <p th:text="${review.createDate != null ? #temporals.format(review.createDate, 'yyyy.MM.dd') : '-'}">
                  작성일
                </p>
              </div>

              <div class="review-rating"
                   th:text="${review.rating == 5 ? '★★★★★' :
                            review.rating == 4 ? '★★★★☆' :
                            review.rating == 3 ? '★★★☆☆' :
                            review.rating == 2 ? '★★☆☆☆' : '★☆☆☆☆'}">
                ★★★★★
              </div>
            </div>

            <p class="review-content" th:text="${review.content}">
              리뷰 내용
            </p>

            <div class="review-actions">

              <form th:action="@{/review/sakjeProc/{id}(id=${review.id})}"
                    method="post"
                    onsubmit="return confirm('리뷰를 삭제하시겠습니까?');">

                <button type="submit" class="delete-review-btn">
                  삭제
                </button>

              </form>

            </div>

          </div>

        </div>

      </section>

    </section>

  </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/review.js}"></script>
<script th:src="@{/js/subscribe.js}"></script>
</body>
</html>
