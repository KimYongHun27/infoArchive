<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>taking-course</title>

    <link rel="stylesheet" th:href="@{/css/taking-course.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="page">

    <!-- 메인 -->
    <div class="main">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="card-container">
                <div class="info-box1">나의 강의장</div>
                <div class="info-box2">
                    <a href="dashboard.html" class="side2">대시보드</a>
                </div>
                <div class="info-box3">
                    <a href="taking-course.html" class="side3">수강중인 강의</a>
                </div>
                <div class="info-box4">
                    <a href="call-dibs.html" class="side4">찜한 강의</a>
                </div>
                <div class="info-box5">
                    <a href="order-details.html" class="side5">주문내역</a>
                </div>
                <div class="info-box6">
                    <a href="coupon.html" class="side6">쿠폰함</a>
                </div>
                <div class="info-box7">
                    <a href="member-info.html" class="side7">회원 정보</a>
                </div>
                <div class="info-box8">
                    <div class="ask">고객센터</div><br>
                    <div class="time">평일: 10:00 ~ 18:00 [점심: 12:00 - 13:00]</div><br>
                    <div class="phone">010-0000-0000</div><br>
                </div>
            </div>
        </aside>

        <section class="content">
            <div class="banner">
                <h1>수강중인 강의</h1><br/>
                <p class="p1">현재 수강 중인 강의의 학습현황을 확인하고 이어서 학습할 수 있습니다.</p>
            </div>
            <div class="course-card">
                <div class="course-container">
                    <div class="course-box">
                        <img src="https://picsum.photos/150" alt="수강 중 강의 이미지" class="course-img" />
                    </div>
                    <div class="course-content">
                        <h2 class="course-name">강의명</h2>
                        <p class="instructor">강의자명</p><br>
                        <p class="percent">00% 학습 중</p><br>
                        <div class="progress"></div>
                    </div>
                    <div class="course-move">
                        <div class="learn">
                            <a href="" class="learn-btn">이어서 학습하기</a>
                        </div>
                        <div class="admission">
                            <a href="" class="admission-btn">강의실 입장</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/subscribe.js}"></script>
</body>
</html>
