<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>수강중인 강의 - InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
    <link rel="stylesheet" th:href="@{/css/taking-course.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="page">

    <div class="main">

        <aside class="taking-course-sidebar">
            <div class="sidebar-card">
                <div class="sidebar-title">
                    <span>▦</span>
                    <strong>나의 강의장</strong>
                </div>

                <nav class="side-menu">
                    <a th:href="@{/dashboard}">
                        <span>▤</span>
                        대시보드
                    </a>

                    <a th:href="@{/taking-course}" class="active">
                        <span>▣</span>
                        수강중인 강의
                    </a>

                    <a th:href="@{/wishlist}">
                        <span>♡</span>
                        찜한 강의
                    </a>

                    <a th:href="@{/orders}">
                        <span>▥</span>
                        주문 내역
                    </a>

                    <a th:href="@{/coupon}">
                        <span>▨</span>
                        쿠폰함
                    </a>

                    <a th:href="@{/member-info}">
                        <span>♙</span>
                        회원 정보
                    </a>

                    <a th:href="@{/review}">
                        <span>★</span>
                        리뷰관리
                    </a>
                </nav>

                <div class="customer-box">
                    <h3>고객센터</h3>
                    <p>평일 10:00 ~ 18:00 [점심 13:00 ~ 14:00]</p>
                    <strong>010-0000-0000</strong>
                </div>
            </div>
        </aside>

        <section class="content">

            <div class="banner">
                <h1>수강중인 강의</h1>
                <p class="p1">현재 수강 중인 강의의 학습현황을 확인하고 이어서 학습할 수 있습니다.</p>
            </div>

            <div class="course-card">

                <!-- 수강중인 강의가 없을 때 -->
                <div class="empty-taking-course"
                     th:if="${enrollmentList == null or #lists.isEmpty(enrollmentList)}">

                    <h2>수강중인 강의가 없습니다.</h2>
                    <p>결제한 강의가 생기면 이곳에서 학습을 이어갈 수 있습니다.</p>

                    <a th:href="@{/top10}" class="empty-course-btn">
                        강의 둘러보기
                    </a>
                </div>

                <!-- 수강중인 강의 목록 -->
                <div class="taking-course-list"
                     th:if="${enrollmentList != null and !#lists.isEmpty(enrollmentList)}">

                    <div class="taking-course-item"
                         th:each="enrollment : ${enrollmentList}">

                        <a th:href="@{/product/{id}(id=${enrollment.product.id})}"
                           class="taking-course-thumb">

                            <img th:if="${enrollment.product.thumbnailUrl != null and !enrollment.product.thumbnailUrl.isEmpty()}"
                                 th:src="@{${enrollment.product.thumbnailUrl}}"
                                 th:alt="${enrollment.product.productName}">

                            <div class="taking-course-no-img"
                                 th:if="${enrollment.product.thumbnailUrl == null or enrollment.product.thumbnailUrl.isEmpty()}">
                                IMAGE
                            </div>

                        </a>

                        <div class="taking-course-info">

                            <span class="taking-category"
                                  th:text="${enrollment.product.category != null ? enrollment.product.category : '강의'}">
                                카테고리
                            </span>

                            <h3 th:text="${enrollment.product.productName}">
                                강의명
                            </h3>

                            <p class="taking-teacher"
                               th:text="${enrollment.product.instructorName != null ? enrollment.product.instructorName : '강사명'}">
                                강사명
                            </p>

                            <div class="progress-box">
                                <div class="progress-text">
                                    <span>학습 진도</span>
                                    <strong th:text="${enrollment.progressRate != null ? enrollment.progressRate : 0} + '%'">
                                        0%
                                    </strong>
                                </div>

                                <div class="progress-bar">
                                    <div class="progress-fill"
                                         th:style="'width:' + (${enrollment.progressRate != null ? enrollment.progressRate : 0}) + '%'">
                                    </div>
                                </div>
                            </div>

                            <div class="taking-bottom">

                                <span class="completed-badge"
                                      th:if="${enrollment.completed != null and enrollment.completed}">
                                    수강완료
                                </span>

                                <span class="ing-badge"
                                      th:if="${enrollment.completed == null or !enrollment.completed}">
                                    수강중
                                </span>

                                <a th:href="@{/course/start/{productId}(productId=${enrollment.product.id})}"
                                   class="continue-btn">
                                    이어서 학습하기
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/subscribe.js}"></script>

</body>
</html>
