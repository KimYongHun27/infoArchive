<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>taking-course</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
    <link rel="stylesheet" th:href="@{/css/taking-course.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="page">

    <!-- 메인 -->
    <div class="main">
        <!-- 사이드바 -->
        <aside class="taking-course-sidebar">
            <div class="sidebar-card">
                <div class="sidebar-title">
                    <span>▦</span>
                    <strong>나의 강의장</strong>
                </div>

                <nav class="side-menu">
                    <a th:href="@{/dashboard}">
                        <span>▤</span>
                        대시보드
                    </a>

                    <a th:href="@{/taking-course}" class="active">
                        <span>▣</span>
                        수강중인 강의
                    </a>

                    <a th:href="@{/wishlist}">
                        <span>♡</span>
                        찜한 강의
                    </a>

                    <a th:href="@{/orders}">
                        <span>▥</span>
                        주문 내역
                    </a>

                    <a th:href="@{/coupon}">
                        <span>▨</span>
                        쿠폰함
                    </a>

                    <a th:href="@{/member-info}">
                        <span>♙</span>
                        회원 정보
                    </a>

                    <a th:href="@{/review}">
                        <span>★</span>
                        리뷰관리
                    </a>
                </nav>

                <div class="customer-box">
                    <h3>고객센터</h3>
                    <p>평일 10:00 ~ 18:00 [점심 13:00 ~ 14:00]</p>
                    <strong>010-0000-0000</strong>
                </div>
            </div>
        </aside>

        <section class="content">
            <div class="banner">
                <h1>수강중인 강의</h1>
                <p class="p1">현재 수강 중인 강의의 학습현황을 확인하고 이어서 학습할 수 있습니다.</p>
            </div>
            <div class="course-card">

                <!-- 실제 수강중인 강의가 없을 때 -->
                <div class="empty-taking-course">
                    <h2>수강중인 강의가 없습니다.</h2>
                    <p>결제한 강의가 생기면 이곳에서 학습을 이어갈 수 있습니다.</p>

                    <a th:href="@{/top10}" class="empty-course-btn">
                        강의 둘러보기
                    </a>
                </div>

            </div>
            <div class="widget">
                <div class="pause">
                    <h2>학습이 잠시 멈췄나요?</h2>
                    <div class="guide">
                        <a href="" class="guide-btn">일시정지 가이드 보기 ></a>
                    </div>
                    <p class="explain">일시 정지 기능을 이용하면 학습기록이 그대로 유지됩니다.</p>
                </div>
            </div>
        </section>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/taking-course.js}"></script>
<script th:src="@{/js/subscribe.js}"></script>
</body>
</html>
