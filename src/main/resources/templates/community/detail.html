<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상세보기 - InfoArchive</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/detail.css}"> <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="detail-container">
    <div class="detail-header">
        <span class="detail-category" th:text="${community.category}">카테고리</span>
        <h2 class="detail-title" th:text="${community.title}">게시글 제목</h2>
        <div class="detail-info">
            <span class="info-author" th:text="${community.user?.name}">작성자</span>
        </div>
    </div>

    <div class="detail-content">
        <div th:id="'CommunityView-' + ${community.id}" class="content-body" th:utext="${community.content}">
            내용
        </div>

        <div th:id="'CommunityEdit-' + ${community.id}" style="display: none;">
            <form th:action="@{/community/editProc}" method="post">
                <input type="hidden" name="id" th:value="${community.id}">
                <input type="hidden" name="category" th:value="${community.category}">
                <div style="margin-bottom: 10px;">
                    <label>제목</label>
                    <input type="text" name="title" th:value="${community.title}" style="width: 100%; padding: 8px;">
                </div>
                <div>
                    <label>내용</label>
                    <textarea name="content" style="width: 100%; min-height: 300px; padding: 8px;" th:text="${community.content}"></textarea>
                </div>
            </form>
        </div>
    </div>

    <div class="detail-footer">
        <div class="left-actions">
            <a th:href="@{/community(page=${page}, category=${category}, kw=${kw})}" class="btn-list">목록으로</a>
        </div>

        <div class="right-actions" th:if="${(community.user != null and loginUserId == community.user.id) or #authorization.expression('hasRole(''ADMIN'')')}">
            <button type="button"
                    id="editBtn"
                    class="action-link modify-btn"
                    th:onclick="tryEdit([[${community.id}]], [[${loginUserId}]], [[${community.user?.id}]], [[${#authorization.expression('hasRole(''ADMIN'')')}]])">
                수정
            </button>

            <form id="deleteForm"
                  th:action="@{/community/deleteProc/{id}(id=${community.id})}"
                  method="post"
                  style="display: inline;">
                <button type="button"
                        id="deleteBtn"
                        class="delete action-link delete-btn"
                        th:onclick="tryDelete([[${loginUserId}]], [[${community.user?.id}]], [[${#authorization.expression('hasRole(''ADMIN'')')}]])">
                    삭제
                </button>
            </form>
        </div>
    </div>



    <div class="answer-list" style="margin-bottom: 30px;">
        <div th:each="answer : ${community.answers}" th:if="${answer.parent == null}" style="border-bottom: 1px solid #eee; padding: 15px 0;">

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong th:text="${answer.user?.name != null ? answer.user.name : '알 수 없음'}">작성자</strong>
                    <span th:if="${answer.user != null and answer.user.username == 'admin'}" style="background: #e6f7ff; color: #1890ff; font-size: 11px; padding: 2px 6px; border-radius: 3px; margin-left: 5px; font-weight: bold;">관리자</span>
                </div>

                <div style="display: flex; gap: 10px; align-items: center;">
                    <button th:if="${loginUserId != null}" type="button" th:onclick="'toggleReplyForm(' + ${answer.id} + ')'"
                            style="background: none; border: none; color: #007bff; cursor: pointer; font-size: 13px; font-weight: bold;">
                        답글
                    </button>

                    <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                        <form th:action="@{|/community/answer/delete/${answer.id}|}" method="post" onsubmit="return confirm('이 댓글을 관리자 권한으로 삭제하시겠습니까?');" style="margin: 0;">
                            <input type="hidden" name="communityId" th:value="${community.id}">
                            <button type="submit" style="background: none; border: none; color: #dc3545; cursor: pointer; font-size: 13px; font-weight: bold;">
                                삭제
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <p style="margin-top: 8px; white-space: pre-wrap;" th:text="${answer.content}">댓글 내용</p>

            <div th:id="'replyForm-' + ${answer.id}" style="display: none; margin-top: 15px; padding: 15px; background: #fafafa; border-radius: 5px; border: 1px solid #e8e8e8;">
                <form th:action="@{|/community/answer/reply/${community.id}/${answer.id}|}" method="post">
                <textarea name="content" rows="2" required
                          style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; resize: none;"
                          placeholder="답글 내용을 입력하세요..."></textarea>
                    <div style="text-align: right; margin-top: 10px;">
                        <button type="button" th:onclick="'toggleReplyForm(' + ${answer.id} + ')'" style="padding: 6px 15px; background-color: #999; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; font-size: 12px;">취소</button>
                        <button type="submit" style="padding: 6px 15px; background-color: #333; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">답글 등록</button>
                    </div>
                </form>
            </div>

            <div th:each="child : ${answer.children}" style="margin-left: 40px; margin-top: 15px; padding: 12px; background-color: #fcfcfc; border-left: 3px solid #ddd; border-radius: 0 4px 4px 0;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <span style="color: #555; margin-right: 5px;">↳</span>
                        <strong th:text="${child.user?.name != null ? child.user.name : '알 수 없음'}">대댓글 작성자</strong>
                        <span th:if="${child.user != null and child.user.username == 'admin'}" style="background: #e6f7ff; color: #1890ff; font-size: 11px; padding: 2px 6px; border-radius: 3px; margin-left: 5px; font-weight: bold;">관리자</span>
                    </div>

                    <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                        <form th:action="@{|/community/answer/delete/${child.id}|}" method="post" onsubmit="return confirm('이 답글을 삭제하시겠습니까?');" style="margin: 0;">
                            <input type="hidden" name="communityId" th:value="${community.id}">
                            <button type="submit" style="background: none; border: none; color: #dc3545; cursor: pointer; font-size: 12px;">
                                삭제
                            </button>
                        </form>
                    </div>
                </div>
                <p style="margin-top: 6px; white-space: pre-wrap; color: #444;" th:text="${child.content}">대댓글 내용</p>
            </div>

        </div>

        <div th:if="${#lists.isEmpty(community.answers)}" style="text-align: center; color: #999; padding: 20px;">
            첫 번째 댓글을 남겨보세요!
        </div>
    </div>

    <div class="answer-form" th:if="${loginUserId != null}">
        <form th:action="@{|/community/answer/create/${community.id}|}" method="post">
            <textarea name="content" rows="3" required
                      style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; resize: none;"
                      placeholder="따뜻한 댓글을 남겨주세요."></textarea>
            <div style="text-align: right; margin-top: 10px;">
                <button type="submit" class="submit-btn"
                        style="padding: 10px 25px; background-color: #333; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    댓글 등록
                </button>
            </div>
        </form>
    </div>
    <div th:if="${loginUserId == null}" style="text-align: center; padding: 20px; background: #f9f9f9; border-radius: 5px;">
        <p>댓글을 작성하려면 <a th:href="@{/user/login}" style="color: #007bff; text-decoration: underline;">로그인</a>이 필요합니다.</p>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/detail.js}"></script>
<script th:src="@{/js/subscribe.js}"></script>
</body>
</html>
