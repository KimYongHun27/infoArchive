<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>community - InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/edit.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>



<div class="form-container">
    <h2>- infoarchive 커뮤니티 -</h2>
    <form name="community" method="post" th:action="@{/community/edit}">

        <select name="category" class="category-select" required>
            <option value="" disabled selected>카테고리 선택</option>
            <option value="drawing">드로잉</option>
            <option value="crafts">공예</option>
            <option value="finance">금융 · 재테크</option>
            <option value="design">디자인</option>
            <option value="picture">사진 · 영상</option>
            <option value="exercise">운동</option>
            <option value="music">음악</option>
            <option value="video">영상/3D</option>
            <option value="cooking">베이킹 · 요리</option>
            <option value="language">제2 외국어</option>
            <option value="programming">프로그래밍</option>
        </select>

        <input type="text" name="title" class="input-title" placeholder="제목을 입력하세요" required>

        <textarea name="content" class="input-content" placeholder="내용을 입력하세요" required></textarea>

        <div class="button-group">
            <button type="button" class="back-btn" onclick="history.back()">이전</button>
            <button type="submit" class="submit-btn">전송</button>
        </div>
    </form>
</div>


<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/subscribe.js}"></script>
<script th:src="@{/js/community.js}"></script>
</body>
</html>
