<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>community - InfoArchive</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/community.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="community-container">
    <h2>- infoarchive 커뮤니티 -</h2>

    <div class="topbar-right">
        <div class="search">
            <button type="button" class="search-community-btn" id="btn_search">
                <img th:src="@{/img/header/1093183.png}" alt="검색">
            </button>
            <input type="text" id="search_kw" th:value="${kw}" placeholder="검색어를 입력하세요">
        </div>
    </div>

    <div class="topbar">
        <aside class="faq-category">
            <button type="button" class="category-btn active" data-category="all">전체</button>
            <button type="button" class="category-btn" data-category="드로잉">드로잉</button>
            <button type="button" class="category-btn" data-category="공예">공예</button>
            <button type="button" class="category-btn" data-category="금융 · 재테크">금융 · 재테크</button>
            <button type="button" class="category-btn" data-category="디자인">디자인</button>
            <button type="button" class="category-btn" data-category="사진 · 영상">사진 · 영상</button>
            <button type="button" class="category-btn" data-category="운동">운동</button>
            <button type="button" class="category-btn" data-category="음악">음악</button>
            <button type="button" class="category-btn" data-category="영상/3D">영상/3D</button>
            <button type="button" class="category-btn" data-category="베이킹 · 요리">베이킹 · 요리</button>
            <button type="button" class="category-btn" data-category="제2 외국어">제2 외국어</button>
            <button type="button" class="category-btn" data-category="프로그래밍">프로그래밍</button>
        </aside>
    </div>

    <table class="community-table">
        <thead>
        <tr>
            <th class="col-no">NO</th>
            <th class="col-cate">카테고리</th>
            <th class="col-title">제목</th>
            <th class="col-id">작성자</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="community, loop : ${paging}" th:data-category="${community.category}">
            <td th:text="${(paging.number * paging.size) + loop.count}"></td>
            <td><span class="category-badge" th:text="${community.category}">카테고리</span></td>
            <td class="title-cell">
                <a th:href="@{|/community/detail/${community.id}|}" th:text="${community.title}"></a>
            </td>
            <td th:text="${community.id}">작성자명</td>
        </tr>
        </tbody>
    </table>

    <div class="bottom-group">
        <div class="pagination-container" th:if="${!paging.isEmpty()}">
            <ul>
                <li th:each="page: ${#numbers.sequence(0, paging.totalPages-1)}"
                    th:if="${page >= paging.number-2 and page <= paging.number+2}"
                    th:classappend="${page == paging.number} ? 'active'">
                    <a th:text="${page + 1}" th:href="@{|?page=${page}|}"></a>
                </li>
            </ul>
        </div>

        <div class="side-action-group">
            <a th:href="@{/community/edit}" class="write-btn">글쓰기</a>
        </div>
    </div>
</div>


<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/header.js}"></script>
<script th:src="@{/js/subscribe.js}"></script>
<script th:src="@{/js/community.js}"></script>
</body>
</html>
