<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원 관리</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/admin-users.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="admin-users-page">

  <section class="page-title">
    <div>
      <h1>회원 관리</h1>
      <p>가입된 회원 정보를 확인하고 관리할 수 있습니다.</p>
    </div>

    <a th:href="@{/admin}" class="back-btn">관리자 홈</a>
  </section>

  <section class="summary-card">
    <p>전체 회원 수</p>
    <strong th:text="${userCount}">0</strong>
  </section>

  <section class="user-table-section">
    <table class="user-table">
      <thead>
      <tr>
        <th>번호</th>
        <th>이름</th>
        <th>이메일</th>
        <th>전화번호</th>
        <th>권한</th>
        <th>가입일</th>
        <th>관리</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.name}">홍길동</td>
        <td th:text="${user.email}">test@test.com</td>
        <td th:text="${user.phone}">010-0000-0000</td>

        <td>
        <td>
        <span class="role-badge admin"
              th:if="${user.role.name() == 'ADMIN'}">
          관리자
        </span>

        <span class="role-badge instructor"
              th:if="${user.role.name() == 'INSTRUCTOR'}">
          강사
        </span>

        <span class="role-badge user"
              th:if="${user.role.name() == 'USER'}">
          일반회원
        </span>

          <span class="role-badge special"
                th:if="${user.role.name() == 'SPECIAL'}">
            특별회원
          </span>
        </td>
        </td>

        <td th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">
          2026-05-07
        </td>

        <td>
          <div class="action-box">
            <a th:href="@{/admin/users/{id}(id=${user.id})}" class="detail-btn">상세</a>

            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                  method="post"
                  onsubmit="return confirm('정말 이 회원을 삭제하시겠습니까?');">
              <button type="submit" class="delete-btn">삭제</button>
            </form>
          </div>
        </td>
      </tr>

      <tr th:if="${#lists.isEmpty(users)}">
        <td colspan="7" class="empty">회원이 없습니다.</td>
      </tr>
      </tbody>
    </table>
  </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
