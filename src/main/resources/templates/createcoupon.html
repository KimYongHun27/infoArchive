<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>쿠폰 관리</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/admin-coupon.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="admin-layout">

    <aside class="admin-sidebar">
        <div class="admin-sidebar-card">

            <div class="admin-sidebar-title">
                <span><img th:src="@{/img/admin/coupon.png}" alt=""></span>
                <strong>관리자 센터</strong>
            </div>

            <nav class="admin-side-menu">
                <a th:href="@{/admin}">
                    <span><img th:src="@{/img/admin/home.png}" alt=""></span>
                    관리자 홈
                </a>

                <a th:href="@{/admin/my-info}">
                    <span><img th:src="@{/img/admin/user.png}" alt=""></span>
                    내 정보
                </a>

                <a th:href="@{/admin/users}">
                    <span><img th:src="@{/img/admin/user.png}" alt=""></span>
                    회원 관리
                </a>

                <a th:href="@{/admin/create}">
                    <span><img th:src="@{/img/admin/admin.png}" alt=""></span>
                    관리자 계정 생성
                </a>

                <a th:href="@{/admin/instructor-applications}">
                    <span><img th:src="@{/img/admin/apply.png}" alt=""></span>
                    강사 신청 관리
                </a>

                <a th:href="@{/admin/products}">
                    <span><img th:src="@{/img/admin/study.png}" alt=""></span>
                    강의 관리
                </a>

                <a th:href="@{/admin/payments}">
                    <span><img th:src="@{/img/admin/card.png}" alt=""></span>
                    결제 관리
                </a>

                <a th:href="@{/admin/coupons}" class="active">
                    <span><img th:src="@{/img/admin/coupon.png}" alt=""></span>
                    쿠폰 관리
                </a>
            </nav>

        </div>
    </aside>

    <section class="admin-content">

        <section class="admin-header">
            <h1>쿠폰 관리</h1>
            <p>관리자가 쿠폰을 생성하고 사용 여부를 관리할 수 있습니다.</p>
        </section>

        <div class="success-message" th:if="${param.createSuccess}">
            쿠폰이 생성되었습니다.
        </div>

        <div class="success-message" th:if="${param.stopSuccess}">
            쿠폰이 중지되었습니다.
        </div>

        <div class="success-message" th:if="${param.resumeSuccess}">
            쿠폰이 다시 사용 가능 상태로 변경되었습니다.
        </div>

        <div class="success-message" th:if="${param.deleteSuccess}">
            쿠폰이 삭제되었습니다.
        </div>

        <section class="admin-table-section">
            <div class="table-title">
                <h2>쿠폰 생성</h2>
            </div>

            <form th:action="@{/coupons/generate}"
                  method="post"
                  class="admin-coupon-form">

                <input type="text"
                       name="couponName"
                       placeholder="쿠폰명"
                       required>

                <input type="number"
                       name="discountAmount"
                       placeholder="할인금액"
                       value="10000"
                       min="0"
                       required>

                <input type="number"
                       name="minOrderAmount"
                       placeholder="최소주문금액"
                       value="50000"
                       min="0"
                       required>

                <input type="number"
                       name="validDays"
                       placeholder="유효기간 일수"
                       value="30"
                       min="1"
                       required>

                <button type="submit">
                    쿠폰 자동 생성
                </button>

            </form>
        </section>

        <section class="admin-table-section">
            <div class="table-title">
                <h2>쿠폰 목록</h2>
                <span>전체 <strong th:text="${couponCount}">0</strong>개</span>
            </div>

            <table class="admin-table">
                <thead>
                <tr>
                    <th>번호</th>
                    <th>쿠폰명</th>
                    <th>쿠폰코드</th>
                    <th>할인금액</th>
                    <th>최소주문금액</th>
                    <th>만료일</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="coupon : ${coupons}">
                    <td th:text="${coupon.id}">1</td>

                    <td th:text="${coupon.couponName}">쿠폰명</td>

                    <td>
                        <span class="coupon-code-text"
                              th:text="${coupon.couponCode}">
                            CODE
                        </span>
                    </td>

                    <td th:text="${#numbers.formatInteger(coupon.discountAmount, 0, 'COMMA')} + '원'">
                        0원
                    </td>

                    <td th:text="${#numbers.formatInteger(coupon.minOrderAmount, 0, 'COMMA')} + '원'">
                        0원
                    </td>

                    <td th:text="${coupon.expiredAt != null ? #temporals.format(coupon.expiredAt, 'yyyy-MM-dd HH:mm') : '-'}">
                        -
                    </td>

                    <td>
                        <span th:if="${coupon.active}" class="coupon-active">
                            사용가능
                        </span>

                        <span th:if="${!coupon.active}" class="coupon-disabled">
                            중지
                        </span>
                    </td>

                    <td>
                        <div class="coupon-action-box">

                            <form th:if="${coupon.active}"
                                  th:action="@{/admin/coupons/{id}/stop(id=${coupon.id})}"
                                  method="post"
                                  onsubmit="return confirm('이 쿠폰을 중지하시겠습니까?');">
                                <button type="submit" class="coupon-stop-btn">
                                    중지
                                </button>
                            </form>

                            <form th:if="${!coupon.active}"
                                  th:action="@{/admin/coupons/{id}/resume(id=${coupon.id})}"
                                  method="post"
                                  onsubmit="return confirm('이 쿠폰을 다시 사용 가능하게 변경하시겠습니까?');">
                                <button type="submit" class="coupon-resume-btn">
                                    재개
                                </button>
                            </form>

                            <form th:action="@{/admin/coupons/{id}/delete(id=${coupon.id})}"
                                  method="post"
                                  onsubmit="return confirm('이 쿠폰을 삭제하시겠습니까? 삭제 후 관리자 목록에서 보이지 않습니다.');">
                                <button type="submit" class="coupon-delete-btn">
                                    삭제
                                </button>
                            </form>

                        </div>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(coupons)}">
                    <td colspan="8" class="empty">
                        등록된 쿠폰이 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
