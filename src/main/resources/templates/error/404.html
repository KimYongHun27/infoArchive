<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="error-page">
    <section class="error-box">
        <h1>404</h1>

        <h2>페이지를 찾을 수 없어요</h2>

        <p>
            요청하신 페이지가 존재하지 않거나,<br>
            주소가 잘못 입력되었을 수 있습니다.
        </p>

        <div class="error-illust">
            <img th:src="@{/img/error/404.png}" alt="404 일러스트">
        </div>

        <a th:href="@{/}" class="home-btn">
            🏠 홈으로 이동
        </a>

        <button type="button" class="back-btn" onclick="history.back()">
            이전 페이지로 돌아가기 〉
        </button>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/subscribe.js}"></script>

</body>
</html>
