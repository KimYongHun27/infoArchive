<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 관리</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin-payments.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="admin-payments-page">

    <section class="page-title">
        <div>
            <h1>결제 관리</h1>
            <p>회원의 결제 내역과 결제 상태를 확인할 수 있습니다.</p>
        </div>

        <a th:href="@{/admin}" class="back-btn">관리자 홈</a>
    </section>

    <section class="summary-card">
        <p>전체 결제 건수</p>
        <strong th:text="${paymentCount}">0</strong>
    </section>

    <section class="payment-table-section">
        <table class="payment-table">
            <thead>
            <tr>
                <th>번호</th>
                <th>주문번호</th>
                <th>결제금액</th>
                <th>결제상태</th>
                <th>결제일시</th>
                <th>관리</th>
            </tr>
            </thead>

            <tbody>

            <tr th:if="${#lists.isEmpty(payments)}">
                <td colspan="6" class="empty-table">
                    결제 내역이 없습니다.
                </td>
            </tr>

            <tr th:each="payment, stat : ${payments}">
                <td th:text="${stat.count}">1</td>

                <td th:text="${payment.orderNumber}">
                    ORDER-001
                </td>

                <td th:text="${#numbers.formatInteger(payment.discountPrice, 3, 'COMMA')} + '원'">
                    9,900원
                </td>

                <td>
                    <span class="payment-status wait"
                          th:if="${payment.paymentStatus != null and payment.paymentStatus.name() == 'WAIT'}">
                        결제대기
                    </span>

                    <span class="payment-status completed"
                          th:if="${payment.paymentStatus != null and payment.paymentStatus.name() == 'COMPLETED'}">
                        결제완료
                    </span>

                    <span class="payment-status cancel"
                          th:if="${payment.paymentStatus != null and payment.paymentStatus.name() == 'CANCEL'}">
                        결제취소
                    </span>

                    <span class="payment-status failed"
                          th:if="${payment.paymentStatus != null and payment.paymentStatus.name() == 'FAILED'}">
                        결제실패
                    </span>

                    <span class="payment-status unknown"
                          th:if="${payment.paymentStatus == null}">
                        상태없음
                    </span>
                </td>

                <td th:text="${payment.orderDate != null ? #temporals.format(payment.orderDate, 'yyyy.MM.dd HH:mm') : '-'}">
                    -
                </td>

                <td>
                    <span class="reason-text">조회 전용</span>
                </td>
            </tr>

            </tbody>
        </table>
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
