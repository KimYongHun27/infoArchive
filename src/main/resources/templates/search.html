<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>검색 결과 - InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/subscribe.css}" />
    <link rel="stylesheet" th:href="@{/css/search.css}" />
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="search-page">

    <section class="search-header">
        <h1>검색 결과</h1>
        <p>
            "<strong th:text="${kw}">검색어</strong>" 에 대한 검색 결과입니다.
        </p>
    </section>

    <section class="search-results">

        <div th:if="${!paging.isEmpty()}"
             th:with="blockSize=10,
                      startPage=${(paging.number / blockSize) * blockSize},
                      endPage=${(startPage + blockSize - 1 < paging.totalPages) ? (startPage + blockSize - 1) : (paging.totalPages - 1)}">

            <div class="search-grid">

                <a class="search-card"
                   th:each="product : ${paging}"
                   th:href="@{/course/view/{id}(id=${product.id})}">

                    <div class="search-card-body">
                        <h3 th:text="${product.productName}">상품명</h3>
                        <strong th:text="${product.price} + '원'">0원</strong>
                        <span th:text="${product.instructorName}">강사명</span>

                        <span th:text="${product.status}">승인상태</span>

                    </div>

                </a>

            </div>

            <ul class="pagination">

                <li class="page-item" th:classappend="${paging.first} ? 'disabled'">
                    <a class="page-link" th:href="@{|?page=0&kw=${kw}|}">처음</a>
                </li>

                <li class="page-item" th:classappend="${!paging.hasPrevious} ? 'disabled'">
                    <a class="page-link" th:href="@{|?page=${paging.number - 1}&kw=${kw}|}">이전</a>
                </li>

                <li th:each="page : ${#numbers.sequence(startPage, endPage)}"
                    class="page-item"
                    th:classappend="${page == paging.number} ? 'active'">
                    <a class="page-link"
                       th:text="${page + 1}"
                       th:href="@{|?page=${page}&kw=${kw}|}">
                        1
                    </a>
                </li>

                <li class="page-item" th:classappend="${!paging.hasNext} ? 'disabled'">
                    <a class="page-link" th:href="@{|?page=${paging.number + 1}&kw=${kw}|}">다음</a>
                </li>

                <li class="page-item" th:classappend="${paging.last} ? 'disabled'">
                    <a class="page-link" th:href="@{|?page=${paging.totalPages - 1}&kw=${kw}|}">끝</a>
                </li>

            </ul>

        </div>

        <div class="empty-box" th:if="${paging.isEmpty()}">
            <p>검색 결과가 없습니다.</p>
        </div>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
