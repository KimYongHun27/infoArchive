<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>검색 결과</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/search.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="search-page">

    <section class="search-header">
        <h1>검색 결과</h1>
        <p>
            <strong th:text="${keyword}">검색어</strong>
            에 대한 검색 결과입니다.
        </p>
    </section>

    <section class="search-grid" th:if="${!#lists.isEmpty(products)}">

        <a class="search-card"
           th:each="product : ${products}"
           th:href="@{/course/view/{id}(id=${product.id})}">

            <div class="thumb">
                <img th:src="@{${product.thumbnailUrl}}" alt="">
            </div>

            <div class="card-info">
                <span class="tag" th:text="${product.category}">카테고리</span>
                <h3 th:text="${product.title}">강의명</h3>
                <p th:text="${product.instructorName}">강사명</p>
                <strong th:text="${product.price} + '원'">0원</strong>
            </div>
        </a>

    </section>

    <section class="empty-box" th:if="${#lists.isEmpty(products)}">
        검색 결과가 없습니다.
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
