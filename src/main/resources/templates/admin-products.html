<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>강의 관리</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin-products.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="admin-products-page">

    <section class="page-title">
        <div>
            <h1>강의 관리</h1>
            <p>등록된 강의와 상품 정보를 확인하고 승인 또는 반려할 수 있습니다.</p>
        </div>

        <a th:href="@{/admin}" class="back-btn">관리자 홈</a>
    </section>

    <section class="summary-card">
        <p>등록 강의 수</p>
        <strong th:text="${productCount}">0</strong>
    </section>

    <section class="product-table-section">
        <table class="product-table">
            <thead>
            <tr>
                <th>번호</th>
                <th>이미지</th>
                <th>강의명</th>
                <th>종류</th>
                <th>가격</th>
                <th>상태</th>
                <th>반려 사유</th>
                <th>등록일</th>
                <th>처리일</th>
                <th>관리</th>
            </tr>
            </thead>

            <tbody>

            <tr th:if="${products == null or #lists.isEmpty(products)}">
                <td colspan="10" class="empty-table">
                    등록된 강의가 없습니다.
                </td>
            </tr>

            <tr th:each="product, stat : ${products}">
                <td th:text="${stat.count}">1</td>

                <td>
                    <div class="product-thumb-box">
                        <img th:if="${product.thumbnailUrl != null and !product.thumbnailUrl.isEmpty()}"
                             th:src="@{${product.thumbnailUrl}}"
                             alt="강의 썸네일">

                        <span th:if="${product.thumbnailUrl == null or product.thumbnailUrl.isEmpty()}">
                            IMG
                        </span>
                    </div>
                </td>

                <td>
                    <strong th:text="${product.productName}">강의명</strong>

                    <p class="admin-small-text"
                       th:if="${product.description != null and !product.description.isEmpty()}"
                       th:text="${#strings.abbreviate(product.description, 45)}">
                        강의 설명
                    </p>
                </td>

                <td>
                    <span th:if="${product.productType != null and product.productType.name() == 'COURSE'}">
                        강의
                    </span>

                    <span th:if="${product.productType != null and product.productType.name() == 'SUBSCRIBE'}">
                        구독상품
                    </span>

                    <span th:if="${product.productType == null}">
                        -
                    </span>
                </td>

                <td th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + '원'">
                    0원
                </td>

                <td>
                    <span th:if="${product.status != null and product.status.name() == 'WAITING'}"
                          class="status wait">
                        검토중
                    </span>

                    <span th:if="${product.status != null and product.status.name() == 'APPROVED'}"
                          class="status open">
                        승인완료
                    </span>

                    <span th:if="${product.status != null and product.status.name() == 'REJECTED'}"
                          class="status reject">
                        반려완료
                    </span>

                    <span th:if="${product.status != null and product.status.name() == 'DELETED'}"
                          class="status close">
                        삭제됨
                    </span>

                    <span th:if="${product.status == null}"
                          class="status close">
                        상태없음
                    </span>
                </td>

                <td class="reject-reason-cell">
                    <span th:if="${product.rejectReason != null and !product.rejectReason.isEmpty()}"
                          th:text="${product.rejectReason}">
                        반려 사유
                    </span>

                    <span th:if="${product.rejectReason == null or product.rejectReason.isEmpty()}"
                          class="empty-reason">
                        -
                    </span>
                </td>

                <td th:text="${product.createdAt != null ? #temporals.format(product.createdAt, 'yyyy.MM.dd HH:mm') : '-'}">
                    -
                </td>

                <td th:text="${product.reviewedAt != null ? #temporals.format(product.reviewedAt, 'yyyy.MM.dd HH:mm') : '-'}">
                    -
                </td>

                <td>
                    <div class="action-box">

                        <!-- 검토중일 때만 승인 가능 -->
                        <form th:if="${product.status != null and product.status.name() == 'WAITING'}"
                              th:action="@{/admin/products/{id}/approve(id=${product.id})}"
                              method="post"
                              onsubmit="return confirm('이 강의를 승인하시겠습니까?');">
                            <button type="submit" class="approve-btn">
                                승인
                            </button>
                        </form>

                        <!-- 검토중일 때만 반려 모달 열기 -->
                        <button th:if="${product.status != null and product.status.name() == 'WAITING'}"
                                type="button"
                                class="reject-open-btn"
                                th:data-product-id="${product.id}">
                            반려
                        </button>

                        <!-- 승인 완료 -->
                        <span th:if="${product.status != null and product.status.name() == 'APPROVED'}"
                              class="reason-text">
                            처리완료
                        </span>

                        <!-- 반려 완료 -->
                        <span th:if="${product.status != null and product.status.name() == 'REJECTED'}"
                              class="reason-text">
                            반려완료
                        </span>

                        <!-- 삭제됨 -->
                        <span th:if="${product.status != null and product.status.name() == 'DELETED'}"
                              class="reason-text">
                            삭제됨
                        </span>

                    </div>

                    <!-- 반려 사유 작성 모달 -->
                    <div class="reject-modal"
                         th:id="'rejectModal-' + ${product.id}">

                        <div class="reject-modal-box">

                            <div class="reject-modal-head">
                                <h3>반려 사유 작성</h3>

                                <button type="button"
                                        class="reject-modal-close"
                                        th:data-product-id="${product.id}">
                                    ×
                                </button>
                            </div>

                            <div class="reject-course-info">
                                <p>반려할 강의</p>
                                <strong th:text="${product.productName}">
                                    강의명
                                </strong>
                            </div>

                            <form th:action="@{/admin/products/{id}/reject(id=${product.id})}"
                                  method="post"
                                  class="reject-modal-form">

                                <label for="rejectReason">반려 사유</label>

                                <textarea id="rejectReason"
                                          name="rejectReason"
                                          placeholder="반려 사유를 입력하세요. 예: 썸네일 이미지가 부적절합니다."
                                          required></textarea>

                                <div class="reject-modal-actions">
                                    <button type="button"
                                            class="modal-cancel-btn"
                                            th:data-product-id="${product.id}">
                                        취소
                                    </button>

                                    <button type="submit" class="modal-reject-btn">
                                        반려 처리
                                    </button>
                                </div>

                            </form>

                        </div>
                    </div>

                </td>
            </tr>

            </tbody>
        </table>
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/admin-products.js}"></script>
</body>
</html>
