<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>장바구니 - InfoArchive</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/cart.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="cart-page">

  <section class="cart-title-box">
    <div>
      <p class="page-label">CART</p>
      <h1>장바구니</h1>
      <p>수강하고 싶은 강의를 장바구니에서 확인하세요.</p>
    </div>
  </section>

  <section class="cart-layout">

    <div class="cart-list">

      <div class="cart-top">
        <label class="check-all">
          <input type="checkbox" checked>
          <span>전체 선택</span>
        </label>

        <button type="button" class="delete-selected-btn">
          선택 삭제
        </button>
      </div>

      <div th:each="cartList : ${cartList}" class="cart-card">
        <h3 th:text="${cartList.lecture.name}">제품명</h3>
      </div>

    <aside class="cart-summary">

      <h2>결제 금액</h2>

      <div class="summary-row">
        <span>상품 금액</span>
        <strong>168,000원</strong>
      </div>

      <div class="summary-row">
        <span>할인 금액</span>
        <strong>-0원</strong>
      </div>

      <div class="summary-total">
        <span>총 결제 금액</span>
        <strong>168,000원</strong>
      </div>

      <button type="button" class="premium-btn" id="openPaymentModal">
        결제하기
        <span>〉</span>
      </button>

      <a th:href="@{/wishlist}" class="wishlist-link">
        찜한 강의 보러가기
      </a>

    </aside>

      <form th:action="@{/payment/confirm}" method="post">

        <input type="hidden" name="orderId" value="MEMBERSHIP-9900">
        <input type="hidden" name="amount" value="9900">
        <input type="hidden" name="membershipType" value="MONTHLY">
        <input type="hidden" name="paymentMethod" id="paymentMethod" value="CARD">

        <div class="payment-method">
          <h3>결제 수단 선택</h3>

          <div class="method-grid">
            <button type="button" class="method active" onclick="selectPaymentMethod('CARD', this)">
              <strong>▭</strong>
              <span>신용/체크카드</span>
            </button>

            <button type="button" class="method" onclick="selectPaymentMethod('KAKAO_PAY', this)">
              <strong>kakao pay</strong>
              <span>카카오페이</span>
            </button>

            <button type="button" class="method" onclick="selectPaymentMethod('NAVER_PAY', this)">
              <strong>N pay</strong>
              <span>네이버페이</span>
            </button>

            <button type="button" class="method" onclick="selectPaymentMethod('TOSS_PAY', this)">
              <strong>toss</strong>
              <span>토스페이</span>
            </button>
          </div>
        </div>

        <!-- 카드 정보 입력 -->
        <div class="mock-card-box" id="mockCardBox">
          <h3>카드 정보 입력</h3>

          <div class="card-input-group">
            <label>카드번호</label>
            <input type="text"
                   name="cardNumber"
                   placeholder="카드번호 19자리를 입력하세요."
                   maxlength="19">
          </div>

          <div class="card-row">
            <div class="card-input-group">
              <label>유효기간</label>
              <input type="text"
                     name="cardExpire"
                     placeholder="유효기간을 입력하세요."
                     maxlength="5">
            </div>

            <div class="card-input-group">
              <label>CVC</label>
              <input type="password"
                     name="cardCvc"
                     placeholder="CVC를 입력하세요."
                     maxlength="3">
            </div>
          </div>

          <div class="card-input-group">
            <label>카드 비밀번호 앞 2자리</label>
            <input type="password"
                   name="cardPassword"
                   placeholder="카드비밀번호 앞 2자리 입력하세요."
                   maxlength="2">
          </div>


        </div>

        <button type="submit" class="pay-btn">9,900원 결제하기</button>

        <label class="agree-check">
          <input type="checkbox" name="agree" required checked>
          <span><b>구매조건</b> 확인 및 결제에 동의합니다.</span>
        </label>

      </form>

  </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>
</body>
<script th:src="@{/js/membership.js}"></script>
</html>
