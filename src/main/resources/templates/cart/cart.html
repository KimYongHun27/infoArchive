<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>장바구니 - InfoArchive</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/cart.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="cart-page">

  <section class="cart-title-box">
    <div>
      <p class="page-label">CART</p>
      <h1>장바구니</h1>
      <p>수강하고 싶은 강의를 장바구니에서 확인하세요.</p>
    </div>
  </section>

  <section class="cart-layout">

    <div class="cart-list">

      <div class="cart-top">
        <label class="check-all">
          <input type="checkbox" checked>
          <span>전체 선택</span>
        </label>

        <form th:if="${cartList != null and !#lists.isEmpty(cartList)}"
              th:action="@{/cart/clear}"
              method="post">
          <button type="submit" class="delete-selected-btn">
            전체 삭제
          </button>
        </form>
      </div>

      <!-- 결제 form -->
      <form id="checkoutForm"
            th:action="@{/payment/checkout}"
            method="post">

        <div th:if="${cartList == null or #lists.isEmpty(cartList)}"
             class="empty-cart">
          장바구니가 비어 있습니다.

          <div style="margin-top: 20px;">
            <a th:href="@{/top10}" class="wishlist-link">
              강의 둘러보기
            </a>
          </div>
        </div>

        <div th:each="cartItem : ${cartList}"
             class="cart-card">

          <div class="cart-card-left">

            <!-- 결제할 cart id -->
            <input type="checkbox"
                   name="cartIds"
                   th:value="${cartItem.id}"
                   checked>

            <a th:href="@{/product/{id}(id=${cartItem.product.id})}"
               class="cart-product-link">

              <img th:src="@{${cartItem.product.thumbnailUrl}}"
                   th:alt="${cartItem.product.productName}"
                   class="cart-thumb">

              <div class="cart-info">
                <h3 th:text="${cartItem.product.productName}">
                  강의명
                </h3>

                <p th:text="${cartItem.product.instructorName}">
                  강사명
                </p>

                <span class="cart-category"
                      th:text="${cartItem.product.category}">
                  카테고리
                </span>
              </div>

            </a>

          </div>

          <div class="cart-card-right">

            <strong th:text="${#numbers.formatInteger(cartItem.product.price, 3, 'COMMA')} + '원'">
              0원
            </strong>

            <button type="submit"
                    th:form="'deleteForm-' + ${cartItem.product.id}"
                    class="cart-remove-btn">
              삭제
            </button>

          </div>

        </div>

        <input type="hidden"
               name="amount"
               th:value="${totalPrice}">

      </form>

      <!-- 삭제 form들 -->
      <div th:each="cartItem : ${cartList}">
        <form th:id="'deleteForm-' + ${cartItem.product.id}"
              th:action="@{/cart/delete/{id}(id=${cartItem.product.id})}"
              method="post">
        </form>
      </div>

    </div>

    <aside class="cart-summary">

      <h2>결제 금액</h2>

      <div class="summary-row">
        <span>상품 금액</span>
        <strong th:text="${#numbers.formatInteger(totalPrice, 3, 'COMMA')} + '원'">
          0원
        </strong>
      </div>

      <div class="summary-row">
        <span>할인 금액</span>
        <strong>-0원</strong>
      </div>

      <div class="summary-total">
        <span>총 결제 금액</span>
        <strong th:text="${#numbers.formatInteger(totalPrice, 3, 'COMMA')} + '원'">
          0원
        </strong>
      </div>

      <button type="submit"
              form="checkoutForm"
              class="pay-btn"
              th:disabled="${cartList == null or #lists.isEmpty(cartList)}">
        결제하기
      </button>

      <a th:href="@{/wishlist}" class="wishlist-link">
        찜한 강의 보러가기
      </a>

    </aside>

  </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

</body>
</html>
