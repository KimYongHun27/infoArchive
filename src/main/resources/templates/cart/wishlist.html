<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>찜한 강의 - InfoArchive</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/cart.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="cart-page">

  <section class="cart-title-box">
    <div>
      <p class="page-label">WISHLIST</p>
      <h1>찜한 강의</h1>
      <p>관심 있는 강의를 모아두고 나중에 다시 확인하세요.</p>
    </div>
  </section>

  <section class="wishlist-grid">

    <!-- 찜한 강의가 없을 때 -->
    <div class="empty-wishlist">
      <div class="empty-icon">
        <i class="fa-regular fa-heart"></i>
      </div>

      <h2>찜한 강의가 없습니다.</h2>

      <p>
        관심 있는 강의를 찜하면<br>
        이곳에서 다시 확인할 수 있습니다.
      </p>

      <a th:href="@{/top10}" class="empty-wishlist-btn">
        강의 둘러보기
      </a>
    </div>

  </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/moveToCart.js}"></script>
</body>
</html>
