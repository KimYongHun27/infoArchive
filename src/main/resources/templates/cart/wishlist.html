<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>찜한 강의 - InfoArchive</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/wishlist.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="wishlist-page">

  <div class="wishlist-layout">

    <!-- 왼쪽 사이드바 -->
    <aside class="wishlist-sidebar">
      <div class="wishlist-sidebar-card">

        <div class="wishlist-sidebar-title">
          <span>▦</span>
          <strong>나의 강의장</strong>
        </div>

        <nav class="wishlist-side-menu">

          <a th:href="@{/dashboard}">
            <span>▤</span>
            대시보드
          </a>

          <a th:href="@{/taking-course}">
            <span>▣</span>
            수강중인 강의
          </a>

          <a th:href="@{/wishlist}" class="active">
            <span>♡</span>
            찜한 강의
          </a>

          <a th:href="@{/orders}">
            <span>▥</span>
            주문 내역
          </a>

          <a th:href="@{/coupon}">
            <span>▨</span>
            쿠폰함
          </a>

          <a th:href="@{/member-info}">
            <span>♙</span>
            회원 정보
          </a>

          <a th:href="@{/review}">
            <span>★</span>
            리뷰관리
          </a>

        </nav>

        <div class="wishlist-customer-box">
          <h3>고객센터</h3>
          <p>평일 10:00 ~ 18:00</p>
          <p>점심 12:00 ~ 13:00</p>
          <strong>010-0000-0000</strong>
        </div>

      </div>
    </aside>

    <!-- 오른쪽 본문 -->
    <section class="wishlist-content">

      <section class="cart-title-box">
        <div>
          <p class="page-label">WISHLIST</p>
          <h1>찜한 강의</h1>
          <p>관심 있는 강의를 모아두고 나중에 다시 확인하세요.</p>
        </div>
      </section>

      <section class="wishlist-grid">

        <!-- 찜한 강의가 없을 때 -->
        <div class="empty-wishlist"
             th:if="${wishList == null or #lists.isEmpty(wishList)}">

          <div class="empty-icon">
            <i class="fa-regular fa-heart"></i>
          </div>

          <h2>찜한 강의가 없습니다.</h2>

          <p>
            관심 있는 강의를 찜하면<br>
            이곳에서 다시 확인할 수 있습니다.
          </p>

          <a th:href="@{/top10}" class="empty-wishlist-btn">
            강의 둘러보기
          </a>
        </div>

        <!-- 찜한 강의가 있을 때 -->
        <div class="wishlist-card"
             th:if="${wishList != null and !#lists.isEmpty(wishList)}"
             th:each="wish : ${wishList}">

          <form th:action="@{/wishlist/delete/{productId}(productId=${wish.product.id})}"
                method="post">
            <button type="submit" class="heart-btn active">
              <i class="fa-solid fa-heart"></i>
            </button>
          </form>

          <div class="wish-thumb">
            <img th:if="${wish.product.thumbnailUrl != null and !wish.product.thumbnailUrl.isEmpty()}"
                 th:src="@{${wish.product.thumbnailUrl}}"
                 alt="강의 이미지">

            <div class="no-wish-img"
                 th:if="${wish.product.thumbnailUrl == null or wish.product.thumbnailUrl.isEmpty()}">
              이미지 없음
            </div>
          </div>

          <div class="wish-info">
      <span class="item-category"
            th:text="${wish.product.category != null ? wish.product.category : '강의'}">
        카테고리
      </span>

            <h3 th:text="${wish.product.productName}">
              강의명
            </h3>

            <p th:text="${wish.product.instructorName != null ? wish.product.instructorName : '강사명'}">
              강사명
            </p>

            <strong class="wish-price"
                    th:text="${#numbers.formatInteger(wish.product.price, 3, 'COMMA')} + '원'">
              0원
            </strong>

            <div class="wish-buttons">
              <a th:href="@{/product/{id}(id=${wish.product.id})}"
                 class="cart-add-btn">
                강의 보기
              </a>

              <form th:action="@{/wishlist/delete/{productId}(productId=${wish.product.id})}"
                    method="post">
                <button type="submit" class="wish-delete-btn">
                  삭제
                </button>
              </form>
            </div>
          </div>

        </div>

      </section>

    </section>

  </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/moveToCart.js}"></script>
<script th:src="@{/js/subscribe.js}"></script>

</body>
</html>
