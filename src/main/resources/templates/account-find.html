<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>아이디 / 비밀번호 찾기</title>

  <link rel="stylesheet" th:href="@{/css/account-find.css}">
</head>
<body>

<main class="find-page">

  <section class="find-card">

    <a th:href="@{/login}" class="close-btn">×</a>

    <h1>계정 찾기</h1>
    <p>아이디 찾기 또는 비밀번호 재설정을 선택해주세요.</p>

    <div class="tab-menu">
      <button type="button"
              id="findIdTabBtn"
              class="tab-btn"
              th:classappend="${activeTab == null or activeTab == 'id'} ? ' active' : ''">
        이메일 찾기
      </button>

      <button type="button"
              id="findPasswordTabBtn"
              class="tab-btn"
              th:classappend="${activeTab == 'password'} ? ' active' : ''">
        비밀번호 찾기
      </button>
    </div>

    <!-- 이메일 찾기 -->
    <div id="idTab"
         class="tab-content"
         th:classappend="${activeTab == null or activeTab == 'id'} ? ' active' : ''">

      <form th:action="@{/account/find-id}" method="post">

        <div class="form-group">
          <label>이름</label>
          <input type="text"
                 name="name"
                 placeholder="이름을 입력하세요"
                 required>
        </div>

        <div class="form-group">
          <label>전화번호</label>
          <input type="text"
                 name="phone"
                 class="phone-input"
                 placeholder="010-0000-0000"
                 maxlength="13"
                 required>
        </div>

        <button type="submit" class="submit-btn">
          이메일 찾기
        </button>
      </form>

      <div class="result-box" th:if="${debugName != null}">
        <p>입력값 확인</p>
        <strong th:text="'이름: ' + ${debugName} + ' / 전화번호: ' + ${debugPhone}">
          입력값 확인
        </strong>
      </div>

      <div class="result-box" th:if="${foundEmail != null}">
        <p th:text="${message}">이메일을 찾았습니다.</p>
        <strong th:text="${foundEmail}">user@test.com</strong>
      </div>

      <div class="result-box error"
           th:if="${errorMessage != null and (activeTab == null or activeTab == 'id')}">
        <p th:text="${errorMessage}">
          일치하는 회원 정보를 찾을 수 없습니다.
        </p>
      </div>

    </div>

    <!-- 비밀번호 찾기 -->
    <div id="passwordTab"
         class="tab-content"
         th:classappend="${activeTab == 'password'} ? ' active' : ''">

      <form th:action="@{/account/reset-password}" method="post">

        <div class="form-group">
          <label>이름</label>
          <input type="text"
                 name="name"
                 placeholder="이름을 입력하세요"
                 required>
        </div>

        <div class="form-group">
          <label>이메일</label>
          <input type="email"
                 name="email"
                 placeholder="가입한 이메일"
                 required>
        </div>

        <div class="form-group">
          <label>전화번호</label>
          <input type="text"
                 name="phone"
                 class="phone-input"
                 placeholder="010-0000-0000"
                 maxlength="13"
                 required>
        </div>

        <button type="submit" class="submit-btn">
          임시 비밀번호 발급
        </button>
      </form>

      <div class="result-box" th:if="${passwordSuccess}">
        <p>임시 비밀번호가 발급되었습니다.</p>
        <strong th:text="${temporaryPassword}">Temp1234!</strong>
        <p class="result-desc">
          위 임시 비밀번호로 로그인한 뒤 비밀번호를 변경해주세요.
        </p>
      </div>

      <div class="result-box error"
           th:if="${errorMessage != null and activeTab == 'password'}">
        <p th:text="${errorMessage}">
          일치하는 회원 정보를 찾을 수 없습니다.
        </p>
      </div>

    </div>

    <a th:href="@{/login}" class="login-link">
      로그인으로 돌아가기
    </a>

  </section>

</main>

<script th:src="@{/js/account-find.js}"></script>

</body>
</html>
