<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>아이디 / 비밀번호 찾기</title>

  <link rel="stylesheet" th:href="@{/css/account-find.css}">
</head>
<body>

<main class="find-page">

  <section class="find-card">

    <a th:href="@{/login}" class="close-btn">×</a>

    <h1>계정 찾기</h1>
    <p>아이디 찾기 또는 비밀번호 재설정을 선택해주세요.</p>

    <div class="tab-menu">
      <button type="button"
              class="tab-btn active"
              onclick="openFindTab('id')">
        아이디 찾기
      </button>

      <button type="button"
              class="tab-btn"
              onclick="openFindTab('password')">
        비밀번호 찾기
      </button>
    </div>

    <!-- 아이디 찾기 -->
    <div id="idTab" class="tab-content" style="display:block;">
      <form th:action="@{/account/find-id}" method="post">

        <div class="form-group">
          <label>이름</label>
          <input type="text" name="name" placeholder="이름을 입력하세요" required>
        </div>

        <div class="form-group">
          <label>전화번호</label>
          <input type="text" name="phone" placeholder="010-0000-0000" required>
        </div>

        <button type="submit" class="submit-btn">아이디 찾기</button>
      </form>

      <div class="result-box" th:if="${foundEmail != null}">
        <p>가입된 아이디</p>
        <strong th:text="${foundEmail}">user@test.com</strong>
      </div>
    </div>

    <!-- 비밀번호 찾기 -->
    <div id="passwordTab" class="tab-content" style="display:none;">
      <form th:action="@{/account/reset-password}" method="post">

        <div class="form-group">
          <label>이름</label>
          <input type="text" name="name" placeholder="이름을 입력하세요" required>
        </div>

        <div class="form-group">
          <label>이메일</label>
          <input type="email" name="email" placeholder="가입한 이메일" required>
        </div>

        <div class="form-group">
          <label>전화번호</label>
          <input type="text" name="phone" placeholder="010-0000-0000" required>
        </div>

        <div class="form-group">
          <label>새 비밀번호</label>
          <input type="password" name="newPassword" placeholder="새 비밀번호" required>
        </div>

        <div class="form-group">
          <label>새 비밀번호 확인</label>
          <input type="password" name="newPasswordConfirm" placeholder="새 비밀번호 확인" required>
        </div>

        <button type="submit" class="submit-btn">비밀번호 변경</button>
      </form>

      <div class="result-box" th:if="${passwordSuccess}">
        <p>비밀번호가 변경되었습니다.</p>
        <strong>새 비밀번호로 로그인해주세요.</strong>
      </div>
    </div>

    <a th:href="@{/login}" class="login-link">로그인으로 돌아가기</a>

  </section>

  <script th:src="@{/js/account-find.js}"></script>

</main>
</body>
</html>
