<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>금융·재테크</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/category.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="category-page">

  <section class="category-hero">
    <div class="category-title">
      <img th:src="@{/img/main/cat03.png}" alt="금융·재테크">

      <div>
        <h1>금융·재테크</h1>
        <p>
          돈 관리의 기초부터 투자, 부동산, 주식까지
          실생활에 필요한 재테크 지식을 배워보세요.
        </p>
      </div>
    </div>
  </section>

  <section class="category-tabs">

    <a th:href="@{/top10}">
      <img th:src="@{/img/top10/cat-all.png}" alt="">
      <span>전체</span>
    </a>

    <a th:href="@{/category/drawing}">
      <img th:src="@{/img/main/cat01.png}" alt="">
      <span>드로잉</span>
    </a>

    <a th:href="@{/category/craft}">
      <img th:src="@{/img/main/cat02.png}" alt="">
      <span>공예</span>
    </a>

    <a th:href="@{/category/finance}" class="active">
      <img th:src="@{/img/main/cat03.png}" alt="">
      <span>금융·재테크</span>
    </a>

    <a th:href="@{/category/design}">
      <img th:src="@{/img/main/cat04.png}" alt="">
      <span>디자인</span>
    </a>

    <a th:href="@{/category/photo-video}">
      <img th:src="@{/img/main/cat05.png}" alt="">
      <span>사진·영상</span>
    </a>

    <a th:href="@{/category/fitness}">
      <img th:src="@{/img/main/cat06.png}" alt="">
      <span>운동</span>
    </a>

    <a th:href="@{/category/music}">
      <img th:src="@{/img/main/cat07.png}" alt="">
      <span>음악</span>
    </a>

    <a th:href="@{/category/video-3d}">
      <img th:src="@{/img/main/cat08.png}" alt="">
      <span>영상/3D</span>
    </a>

    <a th:href="@{/category/cooking}">
      <img th:src="@{/img/main/cat09.png}" alt="">
      <span>베이킹·요리</span>
    </a>

    <a th:href="@{/category/language}">
      <img th:src="@{/img/main/cat10.png}" alt="">
      <span>제2외국어</span>
    </a>

    <a th:href="@{/category/programming}">
      <img th:src="@{/img/main/cat11.png}" alt="">
      <span>프로그래밍</span>
    </a>

  </section>

  <section class="category-rank">

    <div class="section-head">
      <h2>금융·재테크 TOP 10</h2>

      <div class="arrow-box">
        <button type="button" class="arrow-btn">
          <i class="fa-solid fa-chevron-left"></i>
        </button>

        <button type="button" class="arrow-btn">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
    </div>

    <div class="drawing-grid">

      <!-- 등록된 강의가 없을 때 -->
      <div th:if="${products == null or #lists.isEmpty(products)}"
           class="empty-category">
        등록된 금융·재테크 강의가 없습니다.
      </div>

      <!-- DB 강의 목록 -->
      <div class="drawing-card-wrap"
           th:each="product, stat : ${products}">

        <a th:href="@{/product/{id}(id=${product.id})}"
           class="drawing-card">

          <span class="rank-num"
                th:classappend="${stat.index < 3} ? ' red' : ''"
                th:text="${stat.index + 1}">
            1
          </span>

          <div class="thumb">

            <img th:if="${product.thumbnailUrl != null and !product.thumbnailUrl.isEmpty()}"
                 th:src="@{${product.thumbnailUrl}}"
                 th:alt="${product.productName}">

            <div th:if="${product.thumbnailUrl == null or product.thumbnailUrl.isEmpty()}"
                 class="thumb-empty">
              IMAGE
            </div>

          </div>

          <div class="card-info">

            <span class="tag"
                  th:text="${product.category != null ? product.category : '금융·재테크'}">
              금융·재테크
            </span>

            <h3 th:text="${product.productName}">
              강의명
            </h3>

            <p class="teacher"
               th:text="${product.instructorName != null ? product.instructorName : '강사명'}">
              강사명
            </p>

            <div class="meta">
              <div class="rating">
                <i class="fa-solid fa-star"></i>
                <span>4.8</span>
                <small>(0)</small>
              </div>

              <span class="student-count">
                수강생 0명
              </span>
            </div>

            <strong class="price"
                    th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + '원'">
              0원
            </strong>

          </div>

        </a>

        <form th:action="@{/wishlist/toggle/{id}(id=${product.id})}"
              method="post"
              class="like-form">

          <button type="submit"
                  class="like-btn"
                  th:classappend="${likedProductIds != null and likedProductIds.contains(product.id)} ? ' active'">

            <span th:text="${likedProductIds != null and likedProductIds.contains(product.id)} ? '♥' : '♡'">
              ♡
            </span>

          </button>

        </form>

      </div>

    </div>

  </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/category.js}"></script>
<script th:src="@{/js/subscribe.js}"></script>

</body>
</html>
