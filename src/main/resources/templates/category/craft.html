<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>공예</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/category.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="category-page">

  <section class="category-hero">
    <div class="category-title">
      <img th:src="@{/img/main/cat01.png}" alt="">
      <div>
        <h1>드로잉</h1>
        <p>인물 스케치부터 디지털 일러스트까지, 드로잉의 모든 것을 배워보세요.</p>
      </div>
    </div>
  </section>

  <section class="category-tabs">
    <a th:href="@{/top10}">
      <img th:src="@{/img/top10/cat-all.png}" alt="">
      <span>전체</span>
    </a>

    <a th:href="@{/category/drawing}">
      <img th:src="@{/img/main/cat01.png}" alt="">
      <span>드로잉</span>
    </a>

    <a th:href="@{/category/craft}" class="active">
      <img th:src="@{/img/main/cat02.png}" alt=""><span>공예</span>
    </a>

    <a th:href="@{/category/finance}">
      <img th:src="@{/img/main/cat03.png}" alt=""><span>금융 · 재테크</span>
    </a>

    <a th:href="@{/category/design}">
      <img th:src="@{/img/main/cat04.png}" alt=""><span>디자인</span>
    </a>

    <a th:href="@{/category/photo-video}">
      <img th:src="@{/img/main/cat05.png}" alt=""><span>사진 · 영상</span>
    </a>

    <a th:href="@{/category/fitness}">
      <img th:src="@{/img/main/cat06.png}" alt=""><span>운동</span>
    </a>

    <a th:href="@{/category/music}">
      <img th:src="@{/img/main/cat07.png}" alt=""><span>음악</span>
    </a>

    <a th:href="@{/category/video-3d}">
      <img th:src="@{/img/main/cat08.png}" alt=""><span>영상/3D</span>
    </a>

    <a th:href="@{/category/cooking}">
      <img th:src="@{/img/main/cat09.png}" alt=""><span>베이킹 · 요리</span>
    </a>

    <a th:href="@{/category/language}">
      <img th:src="@{/img/main/cat10.png}" alt=""><span>제2 외국어</span>
    </a>

    <a th:href="@{/category/programming}">
      <img th:src="@{/img/main/cat11.png}" alt=""><span>프로그래밍</span>
    </a>
  </section>

  <section class="category-rank">
    <div class="section-head">
      <h2>드로잉 TOP 10</h2>

      <div class="arrow-box">
        <button type="button">‹</button>
        <button type="button">›</button>
      </div>
    </div>

    <div class="drawing-grid">
      <a class="drawing-card"
         th:each="course, stat : ${drawingCourses}"
         th:href="@{/course/view/{id}(id=${course.id})}">

        <span class="rank-num"
              th:classappend="${stat.index < 3} ? ' red' : ''"
              th:text="${stat.index + 1}">1</span>

        <div class="thumb">
          <img th:src="@{${course.thumbnailUrl}}" alt="">
        </div>

        <div class="card-info">
          <span class="tag" th:text="${course.subCategory}">스케치</span>
          <h3 th:text="${course.title}">인체 드로잉 기초 마스터</h3>
          <p th:text="${course.instructorName}">일러스트레이터 하루</p>

          <div class="meta">
            ⭐ <span th:text="${course.rating}">4.9</span>
            <span th:text="'수강생 ' + ${course.studentCount} + '명'">수강생 6,201명</span>
          </div>

          <strong th:text="${course.price} + '원'">89,000원</strong>
        </div>
      </a>
    </div>
  </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/subscribe.js}"></script>

</body>
</html>
