<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/checkout.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="content">

    <section class="checkout">

        <!-- 1. 주문 상품 -->
        <div class="box">
            <h2>주문 상품</h2>

            <div class="tag">평생시청</div>

            <div class="order-row">
                <span class="author">일러스트레이터 예성</span>
                <span class="price-text">239,000원</span>
            </div>

            <div class="product-card">
                <div class="product">

                    <img th:src="@{/img/sample.jpg}" alt="상품 이미지">

                    <div class="info">
                        <p class="sub-title">엣지에서 태어나는 삽화스킬 AtoZ</p>
                        <p class="name" th:text="${productName}">엔지에서 태어난 샤우실킬 AtoZ</p>
                        <p class="desc">엔지에서 태어난 샤우실킬 AtoZ</p>
                    </div>

                </div>
            </div>
        </div>

        <!-- 2. 쿠폰 (🔥 이미지와 동일 구조) -->
        <div class="box">
            <h2>쿠폰 선택</h2>

            <!-- 첫 줄 -->
            <div class="coupon-top">
                <span class="coupon-label">쿠폰 할인 금액</span>

                <div class="coupon-right">
                    <span class="coupon-price">0원</span>
                    <button class="coupon-select-btn">쿠폰선택</button>
                </div>
            </div>

            <!-- 입력 줄 -->
            <div class="coupon-bottom">
                <input type="text" placeholder="쿠폰 코드를 입력해주세요.">
                <button class="coupon-issue-btn">쿠폰발급</button>
            </div>
        </div>

        <!-- 3. 결제 금액 -->
        <div class="box">
            <h2>결제 금액</h2>

            <div class="price-row">
                <span>상품 금액</span>
                <span>239,000원</span>
            </div>

            <div class="price-row total">
                <span>총 결제 금액</span>
                <span>239,000원</span>
            </div>
        </div>

        <!-- 4. 결제 수단 -->
        <div class="box">
            <h2>결제 수단</h2>

            <label class="pay">
                <input type="radio" name="pay" checked>
                신용카드
            </label>

            <label class="pay">
                <input type="radio" name="pay">
                무통장입금
            </label>
        </div>

        <!-- 5. 약관 -->
        <div class="box">
            <label class="agree">
                <input id="checked" type="checkbox">
                이용약관 동의 (필수)
            </label>
        </div>

        <!-- 6. 결제 버튼 -->
        <button type="button" id="openModalBtn" class="pay-btn">결제하기</button>

    </section>

    <div id="paymentModal" class="modal-overlay">
        <button type="button" id="closeModalBtn">X</button>

        <form th:action="@{/payment/confirm}" method="post">

            <input type="hidden" name="orderId" value="MEMBERSHIP-9900">
            <input type="hidden" name="amount" value="9900">
            <input type="hidden" name="membershipType" value="MONTHLY">
            <input type="hidden" name="paymentMethod" id="paymentMethod" value="CARD">

            <div class="payment-method">

                <div class="method-grid">
                    <button type="button" class="method active" onclick="selectPaymentMethod('CARD', this)">
                        <strong>▭</strong>
                        <span>신용/체크카드</span>
                    </button>
                </div>
            </div>

            <!-- 카드 정보 입력 -->
            <div class="mock-card-box" id="mockCardBox">
                <h3>카드 정보 입력</h3>

                <div class="card-input-group">
                    <label>카드번호</label>
                    <input type="text"
                           name="cardNumber"
                           placeholder="카드번호 19자리를 입력하세요."
                           maxlength="19">
                </div>

                <div class="card-row">
                    <div class="card-input-group">
                        <label>유효기간</label>
                        <input type="text"
                               name="cardExpire"
                               placeholder="유효기간을 입력하세요."
                               maxlength="5">
                    </div>

                    <div class="card-input-group">
                        <label>CVC</label>
                        <input type="password"
                               name="cardCvc"
                               placeholder="CVC를 입력하세요."
                               maxlength="3">
                    </div>
                </div>

                <div class="card-input-group">
                    <label>카드 비밀번호 앞 2자리</label>
                    <input type="password"
                           name="cardPassword"
                           placeholder="카드비밀번호 앞 2자리 입력하세요."
                           maxlength="2">
                </div>


            </div>

            <button type="submit" class="pay-btn">결제하기</button>

            <label class="agree-check">
                <input type="checkbox" name="agree" required checked>
                <span><b>구매조건</b> 확인 및 결제에 동의합니다.</span>
            </label>

        </form>


    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>

<script th:src="@{/js/checkout.js}"></script>
</html>
