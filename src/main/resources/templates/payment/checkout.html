<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/checkout.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="content">

    <section class="checkout">

        <!-- 1. 주문 상품 -->
        <div class="box">
            <h2>주문 상품</h2>

            <div class="tag">평생시청</div>

            <!-- 장바구니 결제일 때 -->
            <div th:if="${membershipType == 'CART'}">

                <div class="order-row">
                    <span class="author">장바구니 강의</span>
                    <span class="price-text"
                          th:text="${#numbers.formatInteger(amount, 3, 'COMMA')} + '원'">
                        0원
                    </span>
                </div>

                <div class="product-card"
                     th:each="cart : ${cartList}">

                    <div class="product">

                        <img th:src="@{${cart.product.thumbnailUrl}}"
                             th:alt="${cart.product.productName}">

                        <div class="info">
                            <p class="sub-title"
                               th:text="${cart.product.category}">
                                카테고리
                            </p>

                            <p class="name"
                               th:text="${cart.product.productName}">
                                상품명
                            </p>

                            <p class="desc"
                               th:text="${cart.product.instructorName}">
                                강사명
                            </p>
                        </div>

                        <div class="price-text"
                             th:text="${#numbers.formatInteger(cart.product.price, 3, 'COMMA')} + '원'">
                            0원
                        </div>

                    </div>
                </div>

            </div>

            <!-- 단일 상품 / 멤버십 결제일 때 -->
            <div th:if="${membershipType != 'CART'}">

                <div class="order-row">
                    <span class="author"
                          th:text="${membershipType == 'MONTHLY'} ? 'InfoArchive' : '강의 상품'">
                        일러스트레이터 예성
                    </span>

                    <span class="price-text"
                          th:text="${#numbers.formatInteger(amount, 3, 'COMMA')} + '원'">
                        239,000원
                    </span>
                </div>

                <div class="product-card">
                    <div class="product">

                        <img th:if="${product != null}"
                             th:src="@{${product.thumbnailUrl}}"
                             th:alt="${product.productName}">

                        <img th:if="${product == null}"
                             th:src="@{/img/sample.jpg}"
                             alt="상품 이미지">

                        <div class="info">
                            <p class="sub-title"
                               th:text="${membershipType == 'MONTHLY'} ? '프리미엄 멤버십' : '강의 결제'">
                                상품 구분
                            </p>

                            <p class="name"
                               th:text="${productName}">
                                상품명
                            </p>

                            <p class="desc"
                               th:text="${membershipType == 'MONTHLY'} ? 'INFO ARCHIVE 프리미엄 멤버십 이용권입니다.' : '선택한 강의 결제입니다.'">
                                상품 설명
                            </p>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <!-- 2. 쿠폰 -->
        <div class="box">
            <h2>쿠폰 선택</h2>

            <div class="coupon-top">
                <span class="coupon-label">쿠폰 할인 금액</span>

                <div class="coupon-right">
                    <span class="coupon-price">0원</span>
                    <button type="button" class="coupon-select-btn">쿠폰선택</button>
                </div>
            </div>

            <div class="coupon-bottom">
                <input type="text" placeholder="쿠폰 코드를 입력해주세요.">
                <button type="button" class="coupon-issue-btn">쿠폰발급</button>
            </div>
        </div>

        <!-- 3. 결제 금액 -->
        <div class="box">
            <h2>결제 금액</h2>

            <div class="price-row">
                <span>상품 금액</span>
                <span id="originalAmountText"
                      th:text="${#numbers.formatInteger(originalAmount, 3, 'COMMA')} + '원'">
                    0원
                </span>
            </div>

            <div class="price-row">
                <span>할인 금액</span>
                <span id="discountAmountText">0원</span>
            </div>

            <div class="price-row total">
                <span>총 결제 금액</span>
                <span id="finalAmountText"
                      th:text="${#numbers.formatInteger(amount, 3, 'COMMA')} + '원'">
                    0원
                </span>
            </div>

        <!-- 4, 5, 6. 결제 처리 form -->
        <form id="paymentForm" th:action="@{/payment/confirm}" method="post">

            <input type="hidden" name="orderId" th:value="${orderId}">
            <input type="hidden" name="amount" th:value="${amount}">
            <input type="hidden" name="membershipType" th:value="${membershipType}">
            <input type="hidden" name="productId" th:value="${productId}">

            <!-- 장바구니 결제용 cartIds -->
            <input type="hidden"
                   th:each="cartId : ${cartIds}"
                   name="cartIds"
                   th:value="${cartId}">

            <!-- 결제 수단 -->
            <div class="box">
                <h2>결제 수단</h2>

                <label class="pay">
                    <input type="radio" name="paymentMethod" value="CARD" checked>
                    신용카드
                </label>

                <label class="pay">
                    <input type="radio" name="paymentMethod" value="BANK">
                    무통장입금
                </label>
            </div>

            <!-- 약관 -->
            <div class="box">
                <label class="agree">
                    <input type="checkbox" name="agreeTerms" value="true" required>
                    이용약관 동의 (필수)
                </label>
            </div>

            <!-- 결제 버튼 -->
            <button type="button" id="payOpenBtn" class="checkout-pay-btn">
                결제하기
            </button>

            <!-- 카드 정보 모달 -->
            <div class="card-modal" id="cardModal">
                <div class="card-modal-box">

                    <button type="button" class="card-modal-close" id="cardModalClose">
                        ×
                    </button>

                    <h2>카드 정보 입력</h2>
                    <p>결제를 진행하기 위해 카드 정보를 입력해주세요.</p>

                    <div class="card-input-group">
                        <label>카드번호</label>
                        <input type="text"
                               name="cardNumber"
                               placeholder="카드번호 19자리"
                               maxlength="19"
                               inputmode="numeric"
                               pattern="[0-9]{19}">
                    </div>

                    <div class="card-input-row">
                        <div class="card-input-group">
                            <label>유효기간</label>
                            <input type="text"
                                   name="cardExpire"
                                   placeholder="MMYY"
                                   maxlength="4"
                                   inputmode="numeric"
                                   pattern="[0-9]{4}">
                        </div>

                        <div class="card-input-group">
                            <label>CVC</label>
                            <input type="text"
                                   name="cardCvc"
                                   placeholder="CVC 3자리"
                                   maxlength="3"
                                   inputmode="numeric"
                                   pattern="[0-9]{3}">
                        </div>
                    </div>

                    <div class="card-input-group">
                        <label>카드 비밀번호 앞 2자리</label>
                        <input type="password"
                               name="cardPassword"
                               placeholder="비밀번호 앞 2자리"
                               maxlength="2"
                               inputmode="numeric"
                               pattern="[0-9]{2}">
                    </div>

                    <button type="submit" id="cardFinalBtn" class="card-final-btn">
                        최종 결제하기
                    </button>

                </div>
            </div>

        </form>
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>

<script th:src="@{/js/checkout.js}"></script>
</html>
