<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/checkout.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="content">

    <section class="checkout">

        <!-- 1. 주문 상품 -->
        <div class="box">
            <h2>주문 상품</h2>

            <div class="tag">평생시청</div>

            <div class="order-row">
                <span class="author">일러스트레이터 예성</span>
                <span class="price-text">239,000원</span>
            </div>

            <div class="product-card">
                <div class="product">

                    <img th:src="@{/img/sample.jpg}" alt="상품 이미지">

                    <div class="info">
                        <p class="sub-title">엣지에서 태어나는 삽화스킬 AtoZ</p>
                        <p class="name" th:text="${productName}">엔지에서 태어난 샤우실킬 AtoZ</p>
                        <p class="desc">엔지에서 태어난 샤우실킬 AtoZ</p>
                    </div>

                </div>
            </div>
        </div>

        <!-- 2. 쿠폰 (🔥 이미지와 동일 구조) -->
        <div class="box">
            <h2>쿠폰 선택</h2>

            <!-- 첫 줄 -->
            <div class="coupon-top">
                <span class="coupon-label">쿠폰 할인 금액</span>

                <div class="coupon-right">
                    <span class="coupon-price">0원</span>
                    <button class="coupon-select-btn">쿠폰선택</button>
                </div>
            </div>

            <!-- 입력 줄 -->
            <div class="coupon-bottom">
                <input type="text" placeholder="쿠폰 코드를 입력해주세요.">
                <button class="coupon-issue-btn">쿠폰발급</button>
            </div>
        </div>

        <!-- 3. 결제 금액 -->
        <div class="box">
            <h2>결제 금액</h2>

            <div class="price-row">
                <span>상품 금액</span>
                <span>239,000원</span>
            </div>

            <div class="price-row total">
                <span>총 결제 금액</span>
                <span>239,000원</span>
            </div>
        </div>

        <!-- 4. 결제 수단 -->
        <div class="box">
            <h2>결제 수단</h2>

            <label class="pay">
                <input type="radio" name="pay" checked>
                신용카드
            </label>

            <label class="pay">
                <input type="radio" name="pay">
                무통장입금
            </label>
        </div>

        <!-- 5. 약관 -->
        <div class="box">
            <label class="agree">
                <input type="checkbox">
                이용약관 동의 (필수)
            </label>
        </div>

        <!-- 6. 결제 버튼 -->
        <button class="pay-btn">결제하기</button>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
