<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/checkout.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="content">

    <section class="checkout">

        <!-- 1. 주문 상품 -->
        <div class="box">
            <h2>주문 상품</h2>

            <div class="tag">평생시청</div>

            <div class="order-row">
                <span class="author">일러스트레이터 예성</span>
                <span class="price-text">239,000원</span>
            </div>

            <div class="product-card">
                <div class="product">

                    <img th:src="@{/img/sample.jpg}" alt="상품 이미지">

                    <div class="info">
                        <p class="sub-title">엣지에서 태어나는 삽화스킬 AtoZ</p>
                        <p class="name" th:text="${productName}">엔지에서 태어난 샤우실킬 AtoZ</p>
                        <p class="desc">엔지에서 태어난 샤우실킬 AtoZ</p>
                    </div>

                </div>
            </div>
        </div>

        <!-- 2. 쿠폰 (🔥 이미지와 동일 구조) -->
        <div class="box">
            <h2>쿠폰 선택</h2>

            <!-- 첫 줄 -->
            <div class="coupon-top">
                <span class="coupon-label">쿠폰 할인 금액</span>

                <div class="coupon-right">
                    <span class="coupon-price">0원</span>
                    <button class="coupon-select-btn">쿠폰선택</button>
                </div>
            </div>

            <!-- 입력 줄 -->
            <div class="coupon-bottom">
                <input type="text" placeholder="쿠폰 코드를 입력해주세요.">
                <button class="coupon-issue-btn">쿠폰발급</button>
            </div>
        </div>

        <!-- 3. 결제 금액 -->
        <div class="box">
            <h2>결제 금액</h2>

            <div class="price-row">
                <span>상품 금액</span>
                <span th:text="${#numbers.formatInteger(amount, 3, 'COMMA')} + '원'">239,000원</span>
            </div>

            <div class="price-row total">
                <span>총 결제 금액</span>
                <span th:text="${#numbers.formatInteger(amount, 3, 'COMMA')} + '원'">239,000원</span>
            </div>
        </div>
        <!-- 4, 5, 6. 결제 처리 form -->
        <form id="paymentForm" th:action="@{/payment/confirm}" method="post">

            <input type="hidden" name="orderId" th:value="${orderId}">
            <input type="hidden" name="amount" th:value="${amount}">
            <input type="hidden" name="membershipType" value="MONTHLY">

            <!-- 결제 수단 -->
            <div class="box">
                <h2>결제 수단</h2>

                <label class="pay">
                    <input type="radio" name="paymentMethod" value="CARD" checked>
                    신용카드
                </label>

                <label class="pay">
                    <input type="radio" name="paymentMethod" value="BANK">
                    무통장입금
                </label>
            </div>

            <!-- 약관 -->
            <div class="box">
                <label class="agree">
                    <input type="checkbox" name="agreeTerms" value="true" required>
                    이용약관 동의 (필수)
                </label>
            </div>

            <!-- 결제 버튼 -->
            <button type="button" id="payOpenBtn" class="checkout-pay-btn">
                결제하기
            </button>

            <!-- 카드 정보 모달 -->
            <div class="card-modal" id="cardModal">
                <div class="card-modal-box">

                    <button type="button" class="card-modal-close" id="cardModalClose">
                        ×
                    </button>

                    <h2>카드 정보 입력</h2>
                    <p>결제를 진행하기 위해 카드 정보를 입력해주세요.</p>

                    <div class="card-input-group">
                        <label>카드번호</label>
                        <input type="text"
                               name="cardNumber"
                               placeholder="카드번호 19자리"
                               maxlength="19"
                               inputmode="numeric"
                               pattern="[0-9]{19}">
                    </div>

                    <div class="card-input-row">
                        <div class="card-input-group">
                            <label>유효기간</label>
                            <input type="text"
                                   name="cardExpire"
                                   placeholder="MMYY"
                                   maxlength="4"
                                   inputmode="numeric"
                                   pattern="[0-9]{4}">
                        </div>

                        <div class="card-input-group">
                            <label>CVC</label>
                            <input type="text"
                                   name="cardCvc"
                                   placeholder="CVC 3자리"
                                   maxlength="3"
                                   inputmode="numeric"
                                   pattern="[0-9]{3}">
                        </div>
                    </div>

                    <div class="card-input-group">
                        <label>카드 비밀번호 앞 2자리</label>
                        <input type="password"
                               name="cardPassword"
                               placeholder="비밀번호 앞 2자리"
                               maxlength="2"
                               inputmode="numeric"
                               pattern="[0-9]{2}">
                    </div>

                    <button type="submit" id="cardFinalBtn" class="card-final-btn">
                        최종 결제하기
                    </button>

                </div>
            </div>

        </form>
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>

<script th:src="@{/js/checkout.js}"></script>
</html>
