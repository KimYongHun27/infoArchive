<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 계정 생성</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin-create.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="admin-create-page">

    <section class="page-title">
        <div>
            <h1>관리자 계정 생성</h1>
            <p>새로운 관리자 계정을 생성할 수 있습니다.</p>
        </div>

        <a th:href="@{/admin}" class="back-btn">관리자 홈</a>
    </section>

    <section class="create-card">
        <form th:action="@{/admin/create}" method="post">

            <div class="form-group">
                <label>이름</label>
                <input type="text" name="name" placeholder="관리자 이름">
            </div>

            <div class="form-group">
                <label>이메일</label>
                <input type="email" name="email" placeholder="admin@test.com" required>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호" required>
            </div>

            <div class="form-group">
                <label>전화번호</label>
                <input type="text" name="phone" placeholder="010-0000-0000">
            </div>

            <button type="submit" class="submit-btn">관리자 생성</button>
        </form>
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
