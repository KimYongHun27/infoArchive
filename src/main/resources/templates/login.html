<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<section class="login-page">
  <div class="login-card">

    <div class="login-left">
      <h1>INFO ARCHIVE 로그인</h1>
      <p class="login-sub">계정에 로그인하고 나만의 학습을 이어가세요.</p>

      <form>
        <div class="input-box">
          <span class="input-icon">♙</span>
          <input type="email" placeholder="이메일을 입력해주세요">
        </div>

        <div class="input-box">
          <span class="input-icon">▣</span>
          <input type="password" placeholder="비밀번호를 입력해주세요">
          <button type="button" class="eye-btn">◉</button>
        </div>

        <div class="login-option">
          <label>
            <input type="checkbox" checked>
            <span>로그인 상태 유지</span>
          </label>
          <a href="#">비밀번호 찾기</a>
        </div>

        <button type="submit" class="login-btn">로그인</button>
      </form>

      <div class="divider">
        <span></span>
        <p>또는</p>
        <span></span>
      </div>

      <div class="social-login">
        <button><b class="google">G</b><span>Google</span></button>
        <button><b class="kakao">●</b><span>카카오</span></button>
        <button><b class="naver">N</b><span>네이버</span></button>
        <button><b class="apple">●</b><span>Apple</span></button>
      </div>

      <p class="join-text">
        계정이 없으신가요?
        <a href="#">회원가입</a>
      </p>
    </div>

    <div class="login-right">
      <img class="login-right-img" th:src="@{/img/login/login-right.png}" alt="로그인 안내 이미지">
    </div>

  </div>

  <div class="login-bottom">
    <div class="bottom-item">
      <span>🛡️</span>
      <div>
        <h4>안전한 보안</h4>
        <p>개인정보를 안전하게 보호합니다</p>
      </div>
    </div>

    <div class="bottom-item">
      <span>⚡</span>
      <div>
        <h4>간편한 로그인</h4>
        <p>소셜 계정으로 빠르게 로그인</p>
      </div>
    </div>

    <div class="bottom-item">
      <span>◷</span>
      <div>
        <h4>학습 기록 동기화</h4>
        <p>어디서든 학습 내용을 이어서</p>
      </div>
    </div>
  </div>
</section>

</body>
</html>
