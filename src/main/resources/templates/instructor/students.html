<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>수강생 관리 - InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/instructor.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="instructor-page">
    <div class="instructor-layout">

        <aside class="instructor-sidebar">
            <div class="instructor-side-title">
                <span>🎓</span>
                <strong>강사 센터</strong>
            </div>

            <nav class="instructor-menu">
                <a th:href="@{/instructor}">
                    <span>▦</span> 강사 홈
                </a>

                <a th:href="@{/instructor/my-info}">
                    <span>👤</span> 내 정보
                </a>

                <a th:href="@{/instructor/courses}">
                    <span>📚</span> 내 강의 관리
                </a>

                <a th:href="@{/instructor/course-new}">
                    <span>＋</span> 강의 등록
                </a>

                <a th:href="@{/instructor/students}" class="active">
                    <span>👥</span> 수강생 관리
                </a>

                <a th:href="@{/instructor/settlement}">
                    <span>💰</span> 정산 관리
                </a>
            </nav>
        </aside>

        <section class="instructor-content">

            <div class="instructor-head">
                <span class="instructor-label">STUDENTS</span>
                <h1>수강생 관리</h1>
                <p>내 강의를 수강하는 회원 정보와 학습 상태를 확인합니다.</p>
            </div>

            <section class="stat-grid">
                <div class="stat-card">
                    <p>전체 수강생</p>
                    <h3>0</h3>
                </div>

                <div class="stat-card">
                    <p>수강중</p>
                    <h3>0</h3>
                </div>

                <div class="stat-card">
                    <p>수강 완료</p>
                    <h3>0</h3>
                </div>

                <div class="stat-card">
                    <p>평균 진도율</p>
                    <h3>0%</h3>
                </div>
            </section>

            <div class="panel">
                <div class="panel-head">
                    <h2>수강생 목록</h2>
                </div>

                <table class="table">
                    <thead>
                    <tr>
                        <th>번호</th>
                        <th>수강생</th>
                        <th>이메일</th>
                        <th>수강 강의</th>
                        <th>진도율</th>
                        <th>수강 상태</th>
                        <th>수강 시작일</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr>
                        <td colspan="7" class="empty-table">
                            아직 수강생이 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </section>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/subscribe.js}"></script>
</body>
</html>
