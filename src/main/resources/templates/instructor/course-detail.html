<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>강의 상세 - InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/instructor.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="instructor-page">
    <div class="instructor-layout">

        <aside class="instructor-sidebar">
            <div class="instructor-side-title">
                <span>🎓</span>
                <strong>강사 센터</strong>
            </div>

            <nav class="instructor-menu">
                <a th:href="@{/instructor}">
                    <span>▦</span> 강사 홈
                </a>

                <a th:href="@{/instructor/my-info}">
                    <span>👤</span> 내 정보
                </a>

                <a th:href="@{/instructor/courses}" class="active">
                    <span>📚</span> 내 강의 관리
                </a>

                <a th:href="@{/instructor/course-new}">
                    <span>＋</span> 강의 등록
                </a>

                <a th:href="@{/instructor/students}">
                    <span>👥</span> 수강생 관리
                </a>

                <a th:href="@{/instructor/settlement}">
                    <span>💰</span> 정산 관리
                </a>
            </nav>
        </aside>

        <section class="instructor-content">

            <div class="instructor-head">
                <span class="instructor-label">COURSE DETAIL</span>
                <h1 th:text="${course.productName}">강의명</h1>
                <p>등록한 강의의 상세 정보를 확인합니다.</p>
            </div>

            <div class="panel">
                <div class="panel-head">
                    <h2>강의 상세 정보</h2>

                    <a th:href="@{/instructor/courses/{id}/edit(id=${course.id})}" class="primary-btn">
                        수정하기
                    </a>
                </div>

                <table class="table">
                    <tbody>
                    <tr>
                        <th>번호</th>
                        <td th:text="${course.id}">1</td>
                    </tr>

                    <tr>
                        <th>강의명</th>
                        <td th:text="${course.productName}">강의명</td>
                    </tr>

                    <tr>
                        <th>카테고리</th>
                        <td th:text="${course.category}">카테고리</td>
                    </tr>

                    <tr>
                        <th>강사명</th>
                        <td th:text="${course.instructorName}">강사명</td>
                    </tr>

                    <tr>
                        <th>가격</th>
                        <td th:text="${#numbers.formatInteger(course.price, 3, 'COMMA') + '원'}">가격</td>
                    </tr>

                    <tr>
                        <th>할인율</th>
                        <td th:text="${course.discountRate != null ? course.discountRate + '%' : '0%'}">할인율</td>
                    </tr>

                    <tr>
                        <th>상태</th>
                        <td th:text="${course.status}">상태</td>
                    </tr>

                    <tr>
                        <th>설명</th>
                        <td th:text="${course.description}">설명</td>
                    </tr>
                    </tbody>
                </table>

                <div style="margin-top: 24px;">
                    <a th:href="@{/instructor/courses}" class="primary-btn">
                        목록으로
                    </a>
                </div>
            </div>

        </section>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/subscribe.js}"></script>
</body>
</html>
