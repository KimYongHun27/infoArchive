<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>강사 내 정보 - InfoArchive</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/instructor.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="instructor-page">
  <div class="instructor-layout">

    <aside class="instructor-sidebar">
      <div class="instructor-side-title">
        <span>🎓</span>
        <strong>강사 센터</strong>
      </div>

      <nav class="instructor-menu">
        <a th:href="@{/instructor}">
          <span>▦</span> 강사 홈
        </a>

        <a th:href="@{/instructor/my-info}" class="active">
          <span>👤</span> 내 정보
        </a>

        <a th:href="@{/instructor/courses}">
          <span>📚</span> 내 강의 관리
        </a>

        <a th:href="@{/instructor/course-new}">
          <span>＋</span> 강의 등록
        </a>

        <a th:href="@{/instructor/students}">
          <span>👥</span> 수강생 관리
        </a>

        <a th:href="@{/instructor/settlement}">
          <span>💰</span> 정산 관리
        </a>
      </nav>
    </aside>

    <section class="instructor-content">

      <div class="instructor-head">
        <span class="instructor-label">MY INFO</span>
        <h1>내 정보</h1>
        <p>강사 계정 정보, 휴대폰번호와 비밀번호를 관리합니다.</p>
      </div>

      <div class="info-grid">

        <section class="info-panel">
          <div class="panel-head">
            <h2>강사 정보</h2>
          </div>

          <div class="success-message" th:if="${param.phoneSuccess}">
            휴대폰번호가 변경되었습니다.
          </div>

          <div class="error-message" th:if="${param.phoneError}">
            휴대폰번호 형식이 올바르지 않습니다.
          </div>

          <div class="info-row">
            <span>이름</span>
            <strong th:text="${user != null and user.name != null ? user.name : '-'}">
              이름
            </strong>
          </div>

          <div class="info-row">
            <span>계정</span>
            <strong th:text="${user != null ? user.email : session.loginUser}">
              instructor@test.com
            </strong>
          </div>

          <form method="post"
                th:action="@{/instructor/phone/change}"
                class="info-row phone-edit-row">

            <span>휴대폰번호</span>

            <div class="phone-edit-box">
              <input type="text"
                     name="phone"
                     th:value="${user != null ? user.phone : ''}"
                     placeholder="예: 010-1234-5678"
                     required>

              <button type="submit" class="phone-change-btn">
                변경
              </button>
            </div>

          </form>

          <div class="info-row">
            <span>유형</span>
            <strong>강사</strong>
          </div>

          <div class="info-row">
            <span>가입일</span>
            <strong th:text="${user != null and user.createdAt != null ? #temporals.format(user.createdAt, 'yyyy.MM.dd') : '-'}">
              -
            </strong>
          </div>
        </section>

        <section class="info-panel">
          <div class="panel-head">
            <h2>비밀번호 변경</h2>
          </div>

          <div class="error-message" th:if="${param.passwordError}">
            현재 비밀번호가 틀렸거나 새 비밀번호가 일치하지 않습니다.
          </div>

          <div class="success-message" th:if="${param.passwordSuccess}">
            비밀번호가 변경되었습니다.
          </div>

          <form method="post" th:action="@{/instructor/password/change}">

            <div class="form-row">
              <label>현재 비밀번호</label>
              <input type="password"
                     name="currentPassword"
                     placeholder="현재 비밀번호"
                     required>
            </div>

            <div class="form-row">
              <label>새 비밀번호</label>
              <input type="password"
                     name="newPassword"
                     placeholder="새 비밀번호"
                     required>
            </div>

            <div class="form-row">
              <label>새 비밀번호 확인</label>
              <input type="password"
                     name="confirmPassword"
                     placeholder="새 비밀번호 확인"
                     required>
            </div>

            <div class="form-actions">
              <button type="submit" class="primary-btn">
                비밀번호 변경
              </button>
            </div>

          </form>
        </section>

      </div>

    </section>

  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/subscribe.js}"></script>
</body>
</html>
