<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>정산 관리 - InfoArchive</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/instructor.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="instructor-page">
    <div class="instructor-layout">

        <aside class="instructor-sidebar">
            <div class="instructor-side-title">
                <span>🎓</span>
                <strong>강사 센터</strong>
            </div>

            <nav class="instructor-menu">
                <a th:href="@{/instructor}">
                    <span>▦</span> 강사 홈
                </a>

                <a th:href="@{/instructor/my-info}">
                    <span>👤</span> 내 정보
                </a>

                <a th:href="@{/instructor/courses}">
                    <span>📚</span> 내 강의 관리
                </a>

                <a th:href="@{/instructor/course-new}">
                    <span>＋</span> 강의 등록
                </a>

                <a th:href="@{/instructor/students}">
                    <span>👥</span> 수강생 관리
                </a>

                <a th:href="@{/instructor/settlement}" class="active">
                    <span>💰</span> 정산 관리
                </a>
            </nav>
        </aside>

        <section class="instructor-content">

            <div class="instructor-head">
                <span class="instructor-label">SETTLEMENT</span>
                <h1>정산 관리</h1>
                <p>강의 판매 수익과 정산 상태를 확인합니다.</p>
            </div>

            <section class="stat-grid">
                <div class="stat-card">
                    <p>총 판매 금액</p>
                    <h3>0원</h3>
                </div>

                <div class="stat-card">
                    <p>정산 예정</p>
                    <h3>0원</h3>
                </div>

                <div class="stat-card">
                    <p>정산 완료</p>
                    <h3>0원</h3>
                </div>

                <div class="stat-card">
                    <p>미정산</p>
                    <h3>0원</h3>
                </div>
            </section>

            <div class="panel">
                <div class="panel-head">
                    <h2>정산 내역</h2>
                </div>

                <table class="table">
                    <thead>
                    <tr>
                        <th>번호</th>
                        <th>정산월</th>
                        <th>강의명</th>
                        <th>판매금액</th>
                        <th>수수료</th>
                        <th>정산금액</th>
                        <th>상태</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr>
                        <td colspan="7" class="empty-table">
                            아직 정산 내역이 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </section>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/subscribe.js}"></script>
</body>
</html>
