<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>내 강의 관리 - InfoArchive</title>

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/instructor.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/subscribe.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="instructor-page">
  <div class="instructor-layout">

    <aside class="instructor-sidebar">
      <div class="instructor-side-title">
        <span>🎓</span>
        <strong>강사 센터</strong>
      </div>

      <nav class="instructor-menu">
        <a th:href="@{/instructor}">
          <span>▦</span> 강사 홈
        </a>

        <a th:href="@{/instructor/my-info}">
          <span>👤</span> 내 정보
        </a>

        <a th:href="@{/instructor/courses}" class="active">
          <span>📚</span> 내 강의 관리
        </a>

        <a th:href="@{/instructor/course-new}">
          <span>＋</span> 강의 등록
        </a>

        <a th:href="@{/instructor/students}">
          <span>👥</span> 수강생 관리
        </a>

        <a th:href="@{/instructor/settlement}">
          <span>💰</span> 정산 관리
        </a>
      </nav>
    </aside>

    <section class="instructor-content">

      <div class="instructor-head">
        <span class="instructor-label">MY COURSES</span>
        <h1>내 강의 관리</h1>
        <p>등록한 강의 목록을 확인하고 수정할 수 있습니다.</p>
      </div>

      <div class="success-message" th:if="${param.courseSuccess}">
        강의 등록 요청이 완료되었습니다.
      </div>

      <section class="stat-grid">
        <div class="stat-card">
          <p>전체 강의</p>
          <h3 th:text="${totalCount}">0</h3>
        </div>

        <div class="stat-card">
          <p>공개 강의</p>
          <h3 th:text="${openCount}">0</h3>
        </div>

        <div class="stat-card">
          <p>검토중</p>
          <h3>0</h3>
        </div>

        <div class="stat-card">
          <p>비공개</p>
          <h3 th:text="${closedCount}">0</h3>
        </div>
      </section>

      <div class="panel">
        <div class="panel-head">
          <h2>등록 강의 목록</h2>

          <a th:href="@{/instructor/course-new}" class="primary-btn">
            강의 등록
          </a>
        </div>

        <table class="table">
          <thead>
          <tr>
            <th>번호</th>
            <th>강의명</th>
            <th>카테고리</th>
            <th>가격</th>
            <th>수강생</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
          </thead>

          <tbody>

          <tr th:if="${#lists.isEmpty(courses)}">
            <td colspan="7" class="empty-table">
              아직 등록한 강의가 없습니다.
            </td>
          </tr>

          <tr th:each="course, stat : ${courses}">
            <td th:text="${stat.count}">1</td>
            <td th:text="${course.productName}">강의명</td>
            <td th:text="${course.category}">카테고리</td>
            <td th:text="${#numbers.formatInteger(course.price, 3, 'COMMA') + '원'}">가격</td>
            <td>0명</td>
            <td th:text="${course.status}">상태</td>
            <td>
              <a th:href="@{/instructor/courses/{id}/edit(id=${course.id})}">수정</a>
              |
              <a th:href="@{/instructor/courses/{id}(id=${course.id})}">보기</a>
            </td>
          </tr>

          </tbody>
        </table>
      </div>

    </section>

  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/subscribe :: subscribe}"></div>

<script th:src="@{/js/subscribe.js}"></script>
</body>
</html>
